<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ortsschilder Sprint</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      border-bottom: 2px solid #00c853;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #00c853; }

    .settings-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      cursor: pointer;
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .settings-btn:hover { border-color: #00c853; color: #00c853; }
    .settings-btn .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
    }
    .settings-btn .dot.linked { background: #00c853; }

    .container { max-width: 700px; margin: 0 auto; padding: 1.5rem; }

    .ride-list { display: flex; flex-direction: column; gap: 1rem; }

    .ride-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
    }

    .ride-header {
      padding: 1rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .ride-card:hover .ride-header { border-color: #00c853; }
    .ride-title { font-size: 1rem; font-weight: 600; }
    .ride-meta  { font-size: 0.85rem; color: #888; margin-top: 0.2rem; }
    .toggle-icon { color: #555; transition: transform 0.2s; }
    .ride-card.open .toggle-icon { transform: rotate(180deg); color: #00c853; }

    .ride-body { display: none; border-top: 1px solid #2a2a2a; }
    .ride-card.open .ride-body { display: block; }

    .map-container { height: 320px; }

    .ride-actions {
      padding: 0.75rem 1.2rem;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 0.75rem;
    }
    .btn { padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: none; }
    .btn-export { background: #00c853; color: #000; font-weight: 600; }
    .btn-delete { background: #2a2a2a; color: #ff5252; }

    .loading { text-align: center; padding: 3rem; color: #555; }
    .error   { color: #ff5252; text-align: center; padding: 2rem; }

    /* ── Registration overlay ───────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .overlay.hidden { display: none; }

    .reg-panel {
      background: #1a1a1a;
      border-left: 1px solid #2a2a2a;
      width: min(420px, 100vw);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .reg-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .reg-header h2 { font-size: 1.1rem; font-weight: 700; }
    .close-btn {
      background: none; border: none; color: #555;
      font-size: 1.3rem; cursor: pointer; line-height: 1;
      transition: color 0.15s;
    }
    .close-btn:hover { color: #f0f0f0; }

    .reg-current {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .reg-current .label { color: #555; margin-bottom: 0.35rem; }
    .reg-current .val {
      font-family: monospace;
      font-size: 0.9rem;
      color: #00c853;
      background: #111;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      letter-spacing: 0.03em;
      word-break: break-all;
    }
    .reg-current .val.none { color: #555; font-family: inherit; }

    .reg-tabs {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .reg-tab {
      flex: 1;
      padding: 0.75rem 1rem;
      background: none;
      border: none;
      color: #555;
      font-size: 0.85rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .reg-tab.active { color: #00c853; border-bottom-color: #00c853; }
    .reg-tab:hover:not(.active) { color: #aaa; }

    .reg-body { flex: 1; overflow-y: auto; }

    /* Browse tab */
    .pick-list { display: flex; flex-direction: column; }
    .pick-item {
      display: flex;
      align-items: center;
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid #222;
      cursor: pointer;
      gap: 1rem;
      transition: background 0.1s;
    }
    .pick-item:hover { background: #222; }
    .pick-item.selected { background: #0a2e14; }
    .pick-item .pick-radio {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #444; flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .pick-item.selected .pick-radio {
      border-color: #00c853;
      background: radial-gradient(circle at center, #00c853 5px, transparent 5px);
    }
    .pick-info { flex: 1; min-width: 0; }
    .pick-date { font-size: 0.9rem; font-weight: 600; }
    .pick-sub  { font-size: 0.75rem; color: #666; margin-top: 0.15rem; }
    .pick-loading { text-align: center; padding: 2rem; color: #555; font-size: 0.85rem; }

    /* Manual tab */
    .manual-form {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .manual-form label { font-size: 0.8rem; color: #666; }
    .manual-input {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.6rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .manual-input:focus { border-color: #00c853; }
    .manual-hint { font-size: 0.75rem; color: #555; line-height: 1.5; }

    .reg-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .btn-confirm {
      background: #00c853; color: #000;
      font-weight: 700; font-size: 0.9rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px; border: none;
      cursor: pointer; flex: 1;
      opacity: 0.4;
      transition: opacity 0.15s;
    }
    .btn-confirm.ready { opacity: 1; }
    .btn-unlink {
      background: #2a2a2a; color: #ff5252;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      border-radius: 8px; border: none;
      cursor: pointer;
    }

    /* Leaflet popup styling */
    .leaflet-popup-content-wrapper {
      background: #1e1e1e;
      color: #f0f0f0;
      border: 1px solid #333;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .leaflet-popup-tip { background: #1e1e1e; }
    .leaflet-popup-content { margin: 10px 14px; min-width: 180px; }
    .popup-title {
      font-weight: 700; font-size: 0.95rem; color: #00c853;
      margin-bottom: 0.5rem; border-bottom: 1px solid #333; padding-bottom: 0.4rem;
    }
    .popup-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 0.25rem 0; font-size: 0.8rem; gap: 1rem;
    }
    .popup-rank { font-weight: 700; width: 1.4rem; }
    .popup-rank.gold   { color: #ffd700; }
    .popup-rank.silver { color: #c0c0c0; }
    .popup-rank.bronze { color: #cd7f32; }
    .popup-dev  { color: #ccc; flex: 1; font-family: monospace; }
    .popup-dev.me { color: #00c853; font-weight: 600; }
    .popup-delta { color: #888; text-align: right; }
    .popup-loading { color: #555; font-size: 0.8rem; padding: 0.3rem 0; }
  </style>
</head>
<body>

<header>
  <h1>🚴 Ortsschilder Sprint — Fahrten</h1>
  <button class="settings-btn" id="settingsBtn" onclick="openSettings()">
    <span class="dot" id="linkDot"></span>
    <span id="linkLabel">Gerät verknüpfen</span>
  </button>
</header>

<div class="container">
  <div id="root" class="loading">Lade Fahrten…</div>
</div>

<!-- ── Registration panel ───────────────────────────────────────── -->
<div class="overlay hidden" id="overlay" onclick="overlayClick(event)">
  <div class="reg-panel" onclick="event.stopPropagation()">

    <div class="reg-header">
      <h2>Mein Gerät</h2>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>

    <div class="reg-current">
      <div class="label">Aktuell verknüpft</div>
      <div class="val" id="currentVal">—</div>
    </div>

    <div class="reg-tabs">
      <button class="reg-tab active" id="tab-browse-btn" onclick="switchTab('browse')">Aus Fahrten auswählen</button>
      <button class="reg-tab"        id="tab-manual-btn" onclick="switchTab('manual')">Manuell eingeben</button>
    </div>

    <div class="reg-body">

      <!-- Browse tab -->
      <div id="tab-browse">
        <div class="pick-list" id="pickList">
          <div class="pick-loading">Lade Fahrten…</div>
        </div>
      </div>

      <!-- Manual tab -->
      <div id="tab-manual" style="display:none">
        <div class="manual-form">
          <label for="manualInput">Geräte-ID (vom Garmin-Display ablesen)</label>
          <input class="manual-input" id="manualInput" type="text"
                 placeholder="z. B. 3278945612"
                 oninput="onManualInput(this.value)">
          <div class="manual-hint">
            Die ID steht auf deinem Garmin unten im Datenfeld als <strong>ID=…</strong>,
            solange das Gerät noch nicht verknüpft ist.
          </div>
        </div>
      </div>
    </div>

    <div class="reg-footer">
      <button class="btn-confirm" id="confirmBtn" onclick="confirmLink()" disabled>Verknüpfen</button>
      <button class="btn-unlink"  id="unlinkBtn"  onclick="unlink()"      style="display:none">Trennen</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://slcprtkqkqwgstnyfpus.supabase.co";
  const SUPABASE_KEY = "sb_publishable_xeoJUHq3BEvCJbHdvgjQsg_yHyvhXUJ";

  let MY_DEVICE_ID  = localStorage.getItem("my_device_id") || "";
  let _selectedId   = "";     // chosen in browse or manual
  let _currentTab   = "browse";
  let _picksLoaded  = false;

  // ── Header status ──────────────────────────────────────────────

  function updateHeaderStatus() {
    const dot   = document.getElementById("linkDot");
    const label = document.getElementById("linkLabel");
    if (MY_DEVICE_ID) {
      dot.className   = "dot linked";
      label.textContent = "…" + MY_DEVICE_ID.slice(-6);
    } else {
      dot.className   = "dot";
      label.textContent = "Gerät verknüpfen";
    }
  }
  updateHeaderStatus();

  // ── Settings panel ─────────────────────────────────────────────

  function openSettings() {
    document.getElementById("overlay").classList.remove("hidden");
    refreshCurrentVal();
    if (!_picksLoaded) loadPickList();
  }
  function closeSettings() {
    document.getElementById("overlay").classList.add("hidden");
    _selectedId = "";
    updateConfirm();
  }
  function overlayClick(e) {
    if (e.target === document.getElementById("overlay")) closeSettings();
  }

  function refreshCurrentVal() {
    const el = document.getElementById("currentVal");
    if (MY_DEVICE_ID) {
      el.className   = "val";
      el.textContent = MY_DEVICE_ID;
      document.getElementById("unlinkBtn").style.display = "";
    } else {
      el.className   = "val none";
      el.textContent = "Kein Gerät verknüpft";
      document.getElementById("unlinkBtn").style.display = "none";
    }
  }

  function switchTab(tab) {
    _currentTab = tab;
    _selectedId = "";
    document.getElementById("tab-browse").style.display = tab === "browse" ? "" : "none";
    document.getElementById("tab-manual").style.display = tab === "manual" ? "" : "none";
    document.getElementById("tab-browse-btn").className = "reg-tab" + (tab === "browse" ? " active" : "");
    document.getElementById("tab-manual-btn").className = "reg-tab" + (tab === "manual" ? " active" : "");
    if (tab === "browse" && !_picksLoaded) loadPickList();
    if (tab === "manual") document.getElementById("manualInput").value = "";
    updateConfirm();
  }

  // ── Browse list ────────────────────────────────────────────────

  async function loadPickList() {
    _picksLoaded = true;
    const list = document.getElementById("pickList");
    try {
      const rides = await fetchJSON(
        "/rest/v1/rides?select=id,device_id,started_at,ended_at&order=started_at.desc&limit=100"
      );

      if (rides.length === 0) {
        list.innerHTML = '<div class="pick-loading">Noch keine Fahrten vorhanden.</div>';
        return;
      }

      list.innerHTML = "";
      for (const r of rides) {
        const dur   = r.ended_at - r.started_at;
        const isMe  = MY_DEVICE_ID && r.device_id === MY_DEVICE_ID;
        const item  = document.createElement("div");
        item.className  = "pick-item" + (isMe ? " selected" : "");
        item.dataset.id = r.device_id;
        item.innerHTML  = `
          <div class="pick-radio"></div>
          <div class="pick-info">
            <div class="pick-date">${fmtTime(r.started_at)}</div>
            <div class="pick-sub">${fmtDuration(dur)} · ID …${r.device_id.slice(-6)}</div>
          </div>`;
        item.addEventListener("click", () => selectPick(r.device_id, item));
        list.appendChild(item);
      }
    } catch(e) {
      list.innerHTML = `<div class="pick-loading" style="color:#ff5252">Fehler: ${e.message}</div>`;
    }
  }

  function selectPick(deviceId, el) {
    document.querySelectorAll(".pick-item").forEach(i => i.classList.remove("selected"));
    el.classList.add("selected");
    _selectedId = deviceId;
    updateConfirm();
  }

  // ── Manual entry ───────────────────────────────────────────────

  function onManualInput(val) {
    _selectedId = val.trim();
    updateConfirm();
  }

  // ── Confirm / Unlink ───────────────────────────────────────────

  function updateConfirm() {
    const btn = document.getElementById("confirmBtn");
    const ready = _selectedId.length > 0;
    btn.disabled = !ready;
    btn.className = "btn-confirm" + (ready ? " ready" : "");
  }

  async function confirmLink() {
    if (!_selectedId) return;
    const btn = document.getElementById("confirmBtn");
    btn.textContent = "Speichere…";
    btn.disabled    = true;

    try {
      // Write to accounts table so Edge Function can confirm registration on next upload
      await fetch(SUPABASE_URL + "/rest/v1/accounts", {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json",
          "Prefer": "resolution=merge-duplicates"
        },
        body: JSON.stringify({ device_id: _selectedId })
      });
    } catch(e) {
      // accounts table may not exist yet — still save locally
      console.warn("accounts table write failed:", e);
    }

    // Always save locally
    MY_DEVICE_ID = _selectedId;
    localStorage.setItem("my_device_id", MY_DEVICE_ID);

    btn.textContent = "Verknüpft ✓";
    setTimeout(() => {
      closeSettings();
      updateHeaderStatus();
      location.reload(); // refresh ride list so "Du" appears
    }, 700);
  }

  function unlink() {
    if (!confirm("Geräteverknüpfung aufheben?")) return;
    MY_DEVICE_ID = "";
    localStorage.removeItem("my_device_id");
    updateHeaderStatus();
    refreshCurrentVal();
    _selectedId = "";
    updateConfirm();
  }

  // ── API helpers ────────────────────────────────────────────────

  async function fetchJSON(path) {
    const res = await fetch(SUPABASE_URL + path, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    });
    if (!res.ok) throw new Error(res.status + " " + res.statusText);
    return res.json();
  }

  function fmtTime(ts) {
    return new Date(ts * 1000).toLocaleString("de-DE",
      { weekday:"short", day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
  }
  function fmtDuration(sec) {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
    return h > 0 ? `${h}h ${m}min` : `${m} min`;
  }
  function shortId(id) { return id ? "…" + id.slice(-6) : "?"; }

  // ── Ranking popup ──────────────────────────────────────────────

  async function buildRankingHtml(signId, crossingTs) {
    const tFrom = crossingTs - 30;
    const tTo   = crossingTs + 30;
    const rows  = await fetchJSON(
      `/rest/v1/crossings?sign_id=eq.${encodeURIComponent(signId)}` +
      `&timestamp=gte.${tFrom}&timestamp=lte.${tTo}` +
      `&order=timestamp.asc&limit=50&select=device_id,timestamp`
    );

    const best = {};
    for (const r of rows) {
      if (!best[r.device_id] || r.timestamp < best[r.device_id])
        best[r.device_id] = r.timestamp;
    }

    let leaderTs = crossingTs;
    for (const ts of Object.values(best)) { if (ts < leaderTs) leaderTs = ts; }
    const cutoff = leaderTs + 30;

    const group = Object.entries(best)
      .filter(([, ts]) => ts <= cutoff)
      .sort(([, a], [, b]) => a - b);

    if (group.length === 0) return '<div class="popup-loading">Keine Daten</div>';

    const medals = ["gold","silver","bronze"];
    return group.map(([dev, ts], i) => {
      const delta = (ts - leaderTs).toFixed(1);
      const isMe  = MY_DEVICE_ID && dev === MY_DEVICE_ID;
      return `<div class="popup-row">
        <div class="popup-rank ${medals[i]||''}">${i+1}.</div>
        <div class="popup-dev ${isMe?"me":""}">${isMe ? "Du" : shortId(dev)}</div>
        <div class="popup-delta">${i===0 ? "Führend" : "+"+delta+"s"}</div>
      </div>`;
    }).join("");
  }

  // ── Road matching ──────────────────────────────────────────────

  async function matchToRoads(track) {
    const MAX = 99;
    let pts = track;
    if (pts.length > MAX) {
      const out = [];
      for (let i = 0; i < MAX; i++) out.push(pts[Math.floor(i * pts.length / MAX)]);
      out.push(pts[pts.length - 1]);
      pts = out;
    }
    const coords = pts.map(p => `${p[1]},${p[0]}`).join(';');
    const res = await fetch(
      `https://router.project-osrm.org/route/v1/cycling/${coords}?overview=full&geometries=geojson`
    );
    if (!res.ok) throw new Error('OSRM ' + res.status);
    const data = await res.json();
    if (data.code !== 'Ok' || !data.routes?.length) throw new Error('no route');
    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
  }

  // ── Map build ──────────────────────────────────────────────────

  async function buildMap(ride, mapEl) {
    const [rideData, crossings] = await Promise.all([
      fetchJSON(`/rest/v1/rides?id=eq.${ride.id}&select=gps_track`),
      fetchJSON(
        `/rest/v1/crossings?device_id=eq.${encodeURIComponent(ride.device_id)}` +
        `&timestamp=gte.${ride.started_at}&timestamp=lte.${ride.ended_at}` +
        `&order=timestamp.asc&select=sign_id,sign_name,timestamp`
      )
    ]);

    const track = rideData[0]?.gps_track || [];
    const map   = L.map(mapEl);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap", maxZoom: 19
    }).addTo(map);

    if (track.length >= 2) {
      let routePoints = track.map(p => [p[0], p[1]]);
      try { routePoints = await matchToRoads(track); } catch(e) {}

      const line = L.polyline(routePoints, { color: "#00c853", weight: 3 }).addTo(map);
      L.circleMarker(routePoints[0],                    { radius:6, color:"#00c853", fillColor:"#00c853", fillOpacity:1 }).bindPopup("Start").addTo(map);
      L.circleMarker(routePoints[routePoints.length-1], { radius:6, color:"#ff5252", fillColor:"#ff5252", fillOpacity:1 }).bindPopup("Ende").addTo(map);
      map.fitBounds(line.getBounds(), { padding:[20,20] });
    }

    const signIcon = L.divIcon({
      html: `<div style="background:#ff9800;border-radius:50%;width:14px;height:14px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>`,
      className: "", iconAnchor: [7, 7]
    });

    for (const c of crossings) {
      let nearest = null, minDiff = Infinity;
      for (const p of track) {
        const d = Math.abs(p[2] - c.timestamp);
        if (d < minDiff) { minDiff = d; nearest = p; }
      }
      if (!nearest) continue;

      const marker = L.marker([nearest[0], nearest[1]], { icon: signIcon }).addTo(map);
      marker.bindPopup(
        `<div class="popup-title">${c.sign_name}</div><div class="popup-loading">Lade Rangliste…</div>`,
        { maxWidth: 240 }
      );
      marker.on("popupopen", async () => {
        try {
          const html = await buildRankingHtml(c.sign_id, c.timestamp);
          marker.getPopup().setContent(`<div class="popup-title">${c.sign_name}</div>` + html);
        } catch(e) {
          marker.getPopup().setContent(`<div class="popup-title">${c.sign_name}</div><div class="popup-loading" style="color:#ff5252">Fehler</div>`);
        }
      });
    }

    return { track, crossings };
  }

  // ── Export ─────────────────────────────────────────────────────

  async function exportRide(card, btn) {
    const d = card._exportData;
    if (!d) { alert("Öffne die Fahrt zuerst."); return; }

    btn.textContent = "Lade…";
    btn.disabled = true;

    const [routePoints, rankingsHtml] = await Promise.all([
      matchToRoads(d.track).catch(() => d.track.map(p => [p[0], p[1]])),
      Promise.all(d.crossings.map(c => buildRankingHtml(c.sign_id, c.timestamp).catch(() => "")))
    ]);

    btn.textContent = "Export";
    btn.disabled = false;

    const date = new Date(d.ride.started_at * 1000).toLocaleString("de-DE");

    const html = `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ortsschilder Sprint – ${date}</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#f0f0f0}
header{background:#1a1a1a;border-bottom:2px solid #00c853;padding:1.2rem 1.5rem}
h1{color:#00c853;font-size:1.3rem}.sub{color:#888;font-size:.85rem;margin-top:.2rem}
#map{height:100vh}
.leaflet-popup-content-wrapper{background:#1e1e1e;color:#f0f0f0;border:1px solid #333;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.6)}
.leaflet-popup-tip{background:#1e1e1e}
.leaflet-popup-content{margin:10px 14px;min-width:180px}
.popup-title{font-weight:700;font-size:.95rem;color:#00c853;margin-bottom:.5rem;border-bottom:1px solid #333;padding-bottom:.4rem}
.popup-row{display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;font-size:.8rem;gap:1rem}
.popup-rank{font-weight:700;width:1.4rem}
.popup-rank.gold{color:#ffd700}.popup-rank.silver{color:#c0c0c0}.popup-rank.bronze{color:#cd7f32}
.popup-dev{color:#ccc;flex:1;font-family:monospace}
.popup-delta{color:#888;text-align:right}
</style>
</head>
<body>
<div id="map"></div>
<script>
const routePoints=${JSON.stringify(routePoints)};
const track=${JSON.stringify(d.track)};
const crossings=${JSON.stringify(d.crossings)};
const rankings=${JSON.stringify(rankingsHtml)};
const map=L.map("map");
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map);
if(routePoints.length>=2){
  const line=L.polyline(routePoints,{color:"#00c853",weight:3}).addTo(map);
  L.circleMarker(routePoints[0],{radius:6,color:"#00c853",fillColor:"#00c853",fillOpacity:1}).bindPopup("Start").addTo(map);
  L.circleMarker(routePoints[routePoints.length-1],{radius:6,color:"#ff5252",fillColor:"#ff5252",fillOpacity:1}).bindPopup("Ende").addTo(map);
  map.fitBounds(line.getBounds(),{padding:[20,20]});
  const icon=L.divIcon({html:'<div style="background:#ff9800;border-radius:50%;width:14px;height:14px;border:2px solid #fff"></div>',className:"",iconAnchor:[7,7]});
  crossings.forEach((c,i)=>{
    let near=null,md=Infinity;
    for(const p of track){const dd=Math.abs(p[2]-c.timestamp);if(dd<md){md=dd;near=p;}}
    if(near)L.marker([near[0],near[1]],{icon})
      .bindPopup('<div class="popup-title">'+c.sign_name+'<\/div>'+(rankings[i]||""),{maxWidth:240})
      .addTo(map);
  });
}
<\/script>
</body></html>`;

    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([html], {type:"text/html"}));
    a.download = `ortsschilder-${d.ride.started_at}.html`;
    a.click();
  }

  // ── Main ───────────────────────────────────────────────────────

  async function main() {
    const root = document.getElementById("root");

    const cutoff = Math.floor(Date.now() / 1000) - 7 * 86400;
    fetch(SUPABASE_URL + `/rest/v1/rides?started_at=lt.${cutoff}`, {
      method: "DELETE",
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    }).catch(() => {});

    try {
      const rides = await fetchJSON(
        "/rest/v1/rides?select=id,device_id,started_at,ended_at&order=started_at.desc&limit=50"
      );

      if (rides.length === 0) {
        root.innerHTML = '<div class="loading">Noch keine Fahrten — beende eine Aktivität auf dem Garmin.</div>';
        return;
      }

      root.innerHTML = "";
      const list = document.createElement("div");
      list.className = "ride-list";

      for (const ride of rides) {
        const dur  = ride.ended_at - ride.started_at;
        const isMe = MY_DEVICE_ID && ride.device_id === MY_DEVICE_ID;

        const card = document.createElement("div");
        card.className = "ride-card";
        card.innerHTML = `
          <div class="ride-header">
            <div>
              <div class="ride-title">${fmtTime(ride.started_at)}</div>
              <div class="ride-meta">${fmtDuration(dur)} · ${isMe ? "Du" : shortId(ride.device_id)}</div>
            </div>
            <div class="toggle-icon">▼</div>
          </div>
          <div class="ride-body">
            <div class="map-container" id="map-${ride.id}"></div>
            <div class="ride-actions">
              <button class="btn btn-export">Export</button>
              <button class="btn btn-delete">Löschen</button>
            </div>
          </div>`;

        const header = card.querySelector(".ride-header");
        const mapEl  = card.querySelector(".map-container");
        const btnExp = card.querySelector(".btn-export");
        const btnDel = card.querySelector(".btn-delete");
        let loaded   = false;

        header.addEventListener("click", async () => {
          card.classList.toggle("open");
          if (card.classList.contains("open") && !loaded) {
            loaded = true;
            try {
              const { track, crossings } = await buildMap(ride, mapEl);
              card._exportData = { ride, track, crossings };
            } catch(e) {
              mapEl.innerHTML = `<div class="error">Fehler: ${e.message}</div>`;
            }
          }
        });

        btnExp.addEventListener("click", () => exportRide(card, btnExp));
        btnDel.addEventListener("click", async () => {
          if (!confirm("Fahrt löschen?")) return;
          await fetch(SUPABASE_URL + `/rest/v1/rides?id=eq.${ride.id}`, {
            method: "DELETE",
            headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
          });
          card.remove();
        });

        list.appendChild(card);
      }

      root.appendChild(list);
    } catch(e) {
      root.innerHTML = `<div class="error">Verbindungsfehler: ${e.message}</div>`;
    }
  }

  main();
</script>
</body>
</html>
