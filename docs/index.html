<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ortsschilder Sprint</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 104'%3E%3Crect x='37' y='64' width='6' height='40' fill='%23aaa'/%3E%3Crect x='3' y='3' width='74' height='58' rx='11' fill='%23000'/%3E%3Crect x='8' y='8' width='64' height='48' rx='8' fill='%23FFCC00'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* ── Ortsschild Header ── */
    header {
      background: #1a1a1a;
      border-bottom: 2px solid #333;
      padding: 1.8rem 1.5rem;
      text-align: center;
    }
    .ortsschild {
      display: inline-block;
      background: #FFCC00;
      border: 5px solid #000;
      border-radius: 14px;
      padding: 14px 36px;
      color: #000;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* ── Auth Screen ── */
    #auth-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 120px);
      padding: 2rem;
    }
    .auth-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    .auth-card h2 {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #f0f0f0;
    }
    .auth-input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #f0f0f0;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      outline: none;
    }
    .auth-input:focus { border-color: #FFCC00; }
    .auth-input::placeholder { color: #555; }

    .btn-primary {
      width: 100%;
      background: #FFCC00;
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 0.75rem;
    }
    .btn-primary:hover { background: #e6b800; }
    .btn-primary:disabled { background: #555; color: #888; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      background: #2a2a2a;
      color: #ccc;
      border: none;
      border-radius: 8px;
      padding: 0.6rem;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 0.75rem;
    }
    .btn-secondary:hover { background: #333; }

    .auth-switch {
      text-align: center;
      color: #555;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }
    .auth-switch a { color: #FFCC00; cursor: pointer; text-decoration: none; }
    .auth-switch a:hover { text-decoration: underline; }

    .auth-error {
      background: #2a1a1a;
      border: 1px solid #ff5252;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      color: #ff5252;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }
    .auth-info {
      background: #1a2a1a;
      border: 1px solid #00c853;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      color: #00c853;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }

    /* ── App Screen ── */
    #app-screen { display: none; }

    .app-bar {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 0.6rem 1.5rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
    }
    .user-info { font-size: 0.8rem; color: #555; }
    .btn-logout {
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      color: #888;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-logout:hover { border-color: #ff5252; color: #ff5252; }

    .container { max-width: 700px; margin: 0 auto; padding: 1.5rem; }
    .ride-list { display: flex; flex-direction: column; gap: 1rem; }

    .ride-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
    }
    .ride-header {
      padding: 1rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .ride-card:hover .ride-header { background: #1f1f1f; }
    .ride-title { font-size: 1rem; font-weight: 600; }
    .ride-meta  { font-size: 0.85rem; color: #888; margin-top: 0.2rem; }
    .toggle-icon { color: #555; transition: transform 0.2s; }
    .ride-card.open .toggle-icon { transform: rotate(180deg); color: #FFCC00; }

    .ride-body { display: none; border-top: 1px solid #2a2a2a; }
    .ride-card.open .ride-body { display: block; }
    .map-container { height: 320px; }

    .ride-actions {
      padding: 0.75rem 1.2rem;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 0.75rem;
    }
    .btn { padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: none; }
    .btn-export { background: #FFCC00; color: #000; font-weight: 600; }
    .btn-image  { background: #1a1a2e; color: #aaa; border: 1px solid #333; }
    .btn-delete { background: #2a2a2a; color: #ff5252; }

    .loading { text-align: center; padding: 3rem; color: #555; }
    .error   { color: #ff5252; text-align: center; padding: 2rem; }

    /* ── Leaflet Popups (Sign style) ── */
    .sign-popup .leaflet-popup-content-wrapper {
      background: #FFCC00;
      border: 4px solid #000;
      border-radius: 12px;
      box-shadow: 3px 3px 0 #888, 0 4px 16px rgba(0,0,0,0.4);
      color: #000;
      min-width: 160px;
    }
    .sign-popup .leaflet-popup-tip-container { display: none; }
    .sign-popup .leaflet-popup-close-button { color: #000 !important; font-size: 18px !important; top: 6px !important; right: 8px !important; }
    .sign-popup .leaflet-popup-content { margin: 12px 16px; }
    .popup-sign-title {
      font-weight: 800;
      font-size: 1rem;
      color: #000;
      text-align: center;
      padding-bottom: 8px;
      margin-bottom: 8px;
      border-bottom: 2px solid #000;
    }
    .popup-sign-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: #000;
      gap: 12px;
    }
    .popup-sign-row.me { font-weight: 800; }
    .popup-sign-delta { font-weight: 400; color: #333; }
    .popup-sign-loading { color: #555; font-size: 0.8rem; text-align: center; padding: 4px 0; }
  </style>
</head>
<body>

<header>
  <div class="ortsschild">Ortsschilder Sprint</div>
</header>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div class="auth-card">

    <!-- Login -->
    <div id="login-view">
      <h2>Anmelden</h2>
      <div id="login-error" class="auth-error" style="display:none"></div>
      <input class="auth-input" type="email"    id="login-email"    placeholder="E-Mail">
      <input class="auth-input" type="password" id="login-password" placeholder="Passwort">
      <button class="btn-primary" id="btn-login">Anmelden</button>
      <div class="auth-switch">Noch kein Account? <a id="to-register">Registrieren</a></div>
    </div>

    <!-- Register -->
    <div id="register-view" style="display:none">
      <h2>Registrieren</h2>
      <div id="reg-error" class="auth-error" style="display:none"></div>
      <div id="reg-info"  class="auth-info"  style="display:none"></div>
      <input class="auth-input" type="text"     id="reg-name"     placeholder="Name">
      <input class="auth-input" type="email"    id="reg-email"    placeholder="E-Mail">
      <input class="auth-input" type="password" id="reg-password" placeholder="Passwort">
      <input class="auth-input" type="text"     id="reg-device"   placeholder="Garmin Device ID">
      <button class="btn-primary" id="btn-register">Registrieren</button>
      <div class="auth-switch">Schon registriert? <a id="to-login">Anmelden</a></div>
    </div>

  </div>
</div>

<!-- ── App Screen ── -->
<div id="app-screen">
  <div class="app-bar">
    <span class="user-info" id="user-info"></span>
    <button class="btn-logout" id="btn-logout">Abmelden</button>
  </div>
  <div class="container">
    <div id="root" class="loading">Lade Fahrten…</div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://slcprtkqkqwgstnyfpus.supabase.co";
  const SUPABASE_KEY = "sb_publishable_xeoJUHq3BEvCJbHdvgjQsg_yHyvhXUJ";

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Helpers ──────────────────────────────────────────────────────────────

  async function fetchJSON(path) {
    const sess = (await sb.auth.getSession()).data.session;
    const key  = sess ? sess.access_token : SUPABASE_KEY;
    const res  = await fetch(SUPABASE_URL + path, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + key }
    });
    if (!res.ok) throw new Error(res.status + " " + res.statusText);
    return res.json();
  }

  function fmtTime(ts) {
    return new Date(ts * 1000).toLocaleString("de-DE",
      { weekday:"short", day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
  }
  function fmtDuration(sec) {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
    return h > 0 ? `${h}h ${m}min` : `${m} min`;
  }
  function shortId(id) { return id ? "…" + id.slice(-6) : "?"; }

  // ── Auth UI ───────────────────────────────────────────────────────────────

  document.getElementById("to-register").addEventListener("click", e => {
    e.preventDefault();
    document.getElementById("login-view").style.display = "none";
    document.getElementById("register-view").style.display = "block";
  });
  document.getElementById("to-login").addEventListener("click", e => {
    e.preventDefault();
    document.getElementById("register-view").style.display = "none";
    document.getElementById("login-view").style.display = "block";
  });

  document.getElementById("btn-login").addEventListener("click", async () => {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl    = document.getElementById("login-error");
    errEl.style.display = "none";

    if (!email || !password) {
      errEl.textContent = "Bitte E-Mail und Passwort eingeben.";
      errEl.style.display = "block";
      return;
    }

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = "block";
    }
  });

  document.getElementById("btn-register").addEventListener("click", async () => {
    const name     = document.getElementById("reg-name").value.trim();
    const email    = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    const deviceId = document.getElementById("reg-device").value.trim();
    const errEl    = document.getElementById("reg-error");
    const infoEl   = document.getElementById("reg-info");
    errEl.style.display = "none";
    infoEl.style.display = "none";

    if (!name || !email || !password || !deviceId) {
      errEl.textContent = "Bitte alle Felder ausfüllen.";
      errEl.style.display = "block";
      return;
    }

    const { error } = await sb.auth.signUp({
      email, password,
      options: {
        data: { display_name: name, device_id: deviceId },
        emailRedirectTo: "https://85tvcgwnjr-jpg.github.io/ortsschilder/"
      }
    });

    if (error) {
      const msg = error.message.toLowerCase();
      errEl.textContent = (msg.includes("rate") || msg.includes("limit"))
        ? "Versuche es später erneut."
        : (msg.includes("already") || msg.includes("registered") || msg.includes("existing"))
        ? "Ein Konto mit dieser E-Mail-Adresse existiert bereits."
        : error.message;
      errEl.style.display = "block";
    } else {
      infoEl.textContent = "✓ Registriert! Bitte E-Mail bestätigen.";
      infoEl.style.display = "block";
      document.getElementById("reg-name").value     = "";
      document.getElementById("reg-email").value    = "";
      document.getElementById("reg-password").value = "";
      document.getElementById("reg-device").value   = "";
    }
  });

  document.getElementById("btn-logout").addEventListener("click", () => sb.auth.signOut());

  // ── Auth State ────────────────────────────────────────────────────────────

  sb.auth.onAuthStateChange(async (_event, session) => {
    if (session) {
      document.getElementById("auth-screen").style.display = "none";
      document.getElementById("app-screen").style.display  = "block";
      const displayName = session.user.user_metadata?.display_name || session.user.email;
      const deviceId    = session.user.user_metadata?.device_id || "";
      document.getElementById("user-info").textContent = displayName;

      // Upsert profile so rankings can show names
      if (deviceId && displayName) {
        fetch(SUPABASE_URL + "/rest/v1/profiles", {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + session.access_token,
            "Content-Type": "application/json",
            "Prefer": "resolution=merge-duplicates"
          },
          body: JSON.stringify({ device_id: deviceId, display_name: displayName, updated_at: new Date().toISOString() })
        }).catch(() => {});
      }

      loadApp(deviceId);
    } else {
      document.getElementById("auth-screen").style.display = "flex";
      document.getElementById("app-screen").style.display  = "none";
      document.getElementById("root").innerHTML = '<div class="loading">Lade Fahrten…</div>';
    }
  });

  // ── Ranking popup ─────────────────────────────────────────────────────────

  async function loadProfiles(deviceIds) {
    if (!deviceIds.length) return {};
    const ids = deviceIds.map(d => `"${d}"`).join(",");
    try {
      const rows = await fetchJSON(`/rest/v1/profiles?device_id=in.(${encodeURIComponent(deviceIds.join(","))})&select=device_id,display_name`);
      const map = {};
      for (const r of rows) map[r.device_id] = r.display_name;
      return map;
    } catch(e) { return {}; }
  }

  async function buildRankingHtml(signId, crossingTs, myDeviceId) {
    const tFrom = crossingTs - 30;
    const tTo   = crossingTs + 30;
    const rows  = await fetchJSON(
      `/rest/v1/crossings?sign_id=eq.${encodeURIComponent(signId)}` +
      `&timestamp=gte.${tFrom}&timestamp=lte.${tTo}` +
      `&order=timestamp.asc&limit=50&select=device_id,timestamp`
    );
    const best = {};
    for (const r of rows) {
      if (!best[r.device_id] || r.timestamp < best[r.device_id])
        best[r.device_id] = r.timestamp;
    }
    let leaderTs = crossingTs;
    for (const ts of Object.values(best)) { if (ts < leaderTs) leaderTs = ts; }
    const cutoff = leaderTs + 30;
    const group  = Object.entries(best)
      .filter(([, ts]) => ts <= cutoff)
      .sort(([, a], [, b]) => a - b);
    if (group.length === 0) return '<div class="popup-sign-loading">Keine Daten</div>';

    // Load display names for all devices in this group
    const profiles = await loadProfiles(group.map(([dev]) => dev));

    return group.map(([dev, ts], i) => {
      const delta   = (ts - leaderTs).toFixed(1);
      const isMe    = myDeviceId && dev === myDeviceId;
      const devName = isMe ? "Du" : (profiles[dev] || dev);
      const deltaStr = i === 0 ? "" : `<span class="popup-sign-delta">+${delta}s</span>`;
      return `<div class="popup-sign-row ${isMe ? "me" : ""}">
        <span>${i+1}. ${devName}</span>${deltaStr}
      </div>`;
    }).join("");
  }

  // ── Road matching ─────────────────────────────────────────────────────────

  async function matchToRoads(track) {
    const MAX = 99;
    let pts = track;
    if (pts.length > MAX) {
      const out = [];
      for (let i = 0; i < MAX; i++) out.push(pts[Math.floor(i * pts.length / MAX)]);
      out.push(pts[pts.length - 1]);
      pts = out;
    }
    const coords = pts.map(p => `${p[1]},${p[0]}`).join(';');
    const res = await fetch(
      `https://router.project-osrm.org/route/v1/cycling/${coords}?overview=full&geometries=geojson`
    );
    if (!res.ok) throw new Error('OSRM ' + res.status);
    const data = await res.json();
    if (data.code !== 'Ok' || !data.routes?.length) throw new Error('no route');
    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
  }

  // ── Map ───────────────────────────────────────────────────────────────────

  async function buildMap(ride, mapEl, myDeviceId) {
    const [rideData, crossings] = await Promise.all([
      fetchJSON(`/rest/v1/rides?id=eq.${ride.id}&select=gps_track`),
      fetchJSON(
        `/rest/v1/crossings?device_id=eq.${encodeURIComponent(ride.device_id)}` +
        `&timestamp=gte.${ride.started_at}&timestamp=lte.${ride.ended_at}` +
        `&order=timestamp.asc&select=sign_id,sign_name,timestamp`
      )
    ]);
    const track = rideData[0]?.gps_track || [];
    const map   = L.map(mapEl);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap", maxZoom: 19
    }).addTo(map);
    if (track.length >= 2) {
      let routePoints = track.map(p => [p[0], p[1]]);
      try { routePoints = await matchToRoads(track); } catch(e) {}
      const line = L.polyline(routePoints, { color: "#FFCC00", weight: 3 }).addTo(map);
      L.circleMarker(routePoints[0],                    { radius:6, color:"#00c853", fillColor:"#00c853", fillOpacity:1 }).bindPopup("Start").addTo(map);
      L.circleMarker(routePoints[routePoints.length-1], { radius:6, color:"#ff5252", fillColor:"#ff5252", fillOpacity:1 }).bindPopup("Ende").addTo(map);
      map.fitBounds(line.getBounds(), { padding:[20,20] });
    }
    for (const c of crossings) {
      const approxW = Math.round(c.sign_name.length * 5.5 + 14);
      const signIcon = L.divIcon({
        html: `<div style="display:flex;flex-direction:column;align-items:center;">
          <div style="
            background:#FFCC00;
            border:2.5px solid #444;
            border-radius:4px;
            padding:2px 6px;
            font-size:9px;
            font-weight:700;
            color:#000;
            white-space:nowrap;
            font-family:-apple-system,sans-serif;
            line-height:1.4;
            box-shadow:2px 2px 0 #888, 0 2px 6px rgba(0,0,0,0.35);
          ">${c.sign_name}</div>
          <div style="
            width:3px;
            height:14px;
            background:linear-gradient(to right,#ccc,#888,#ccc);
            border-radius:0 0 2px 2px;
          "></div>
        </div>`,
        className: "",
        iconAnchor: [Math.round(approxW / 2), 30]
      });
      let nearest = null, minDiff = Infinity;
      for (const p of track) {
        const d = Math.abs(p[2] - c.timestamp);
        if (d < minDiff) { minDiff = d; nearest = p; }
      }
      if (!nearest) continue;
      const marker = L.marker([nearest[0], nearest[1]], { icon: signIcon }).addTo(map);
      const title = `<div class="popup-sign-title">${c.sign_name}</div>`;
      marker.bindPopup(
        title + `<div class="popup-sign-loading">Lade…</div>`,
        { maxWidth: 260, className: "sign-popup" }
      );
      marker.on("popupopen", async () => {
        try {
          const html = await buildRankingHtml(c.sign_id, c.timestamp, myDeviceId);
          marker.getPopup().setContent(title + html);
        } catch(e) {
          marker.getPopup().setContent(title + `<div class="popup-sign-loading" style="color:#c00">Fehler</div>`);
        }
      });
    }
    return { track, crossings };
  }

  // ── Ranking data (structured, for image export) ───────────────────────────

  async function buildRankingData(signId, crossingTs, myDeviceId) {
    try {
      const tFrom = crossingTs - 30, tTo = crossingTs + 30;
      const rows = await fetchJSON(
        `/rest/v1/crossings?sign_id=eq.${encodeURIComponent(signId)}` +
        `&timestamp=gte.${tFrom}&timestamp=lte.${tTo}&order=timestamp.asc&limit=50&select=device_id,timestamp`
      );
      const best = {};
      for (const r of rows) {
        if (!best[r.device_id] || r.timestamp < best[r.device_id]) best[r.device_id] = r.timestamp;
      }
      let leaderTs = crossingTs;
      for (const ts of Object.values(best)) { if (ts < leaderTs) leaderTs = ts; }
      const group = Object.entries(best).filter(([,ts]) => ts <= leaderTs + 30).sort(([,a],[,b]) => a - b);
      const profiles = await loadProfiles(group.map(([dev]) => dev));
      return group.map(([dev, ts], i) => ({
        name:  myDeviceId && dev === myDeviceId ? "Du" : (profiles[dev] || dev.slice(-6)),
        delta: (ts - leaderTs).toFixed(1),
        isMe:  myDeviceId && dev === myDeviceId,
        rank:  i + 1
      }));
    } catch(e) { return []; }
  }

  // ── Canvas helpers ────────────────────────────────────────────────────────

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawSignMarker(ctx, px, py, signName, ranking) {
    const nameFont = "bold 22px -apple-system, BlinkMacSystemFont, sans-serif";
    const rankFont = "bold 17px -apple-system, BlinkMacSystemFont, sans-serif";
    const top3     = (ranking || []).slice(0, 3);
    const padX     = 18;
    const padY     = 10;
    const nameH    = 28;
    const rowH     = 22;
    const divH     = top3.length > 0 ? 8 : 0;

    // Measure max content width
    ctx.font = nameFont;
    let maxW = ctx.measureText(signName).width;
    ctx.font = rankFont;
    for (const r of top3) {
      const label = `${r.rank}. ${r.name}${r.rank > 1 ? "  +" + r.delta + "s" : ""}`;
      maxW = Math.max(maxW, ctx.measureText(label).width);
    }

    const sW = maxW + 2 * padX;
    const sH = padY + nameH + divH + top3.length * rowH + padY;
    const sX = px - sW / 2;
    const sY = py - sH - 18;

    // Pole
    const grad = ctx.createLinearGradient(px - 3, 0, px + 3, 0);
    grad.addColorStop(0, "#ccc"); grad.addColorStop(0.5, "#888"); grad.addColorStop(1, "#ccc");
    ctx.fillStyle = grad;
    ctx.fillRect(px - 3, sY + sH, 6, 18);

    // Shadow
    ctx.shadowColor = "rgba(0,0,0,0.35)";
    ctx.shadowBlur = 10; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;

    // Sign fill
    ctx.fillStyle = "#FFCC00";
    roundRect(ctx, sX, sY, sW, sH, 8);
    ctx.fill();

    // Border
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = "#000"; ctx.lineWidth = 3.5;
    roundRect(ctx, sX, sY, sW, sH, 8);
    ctx.stroke();

    // Town name
    ctx.fillStyle = "#000"; ctx.font = nameFont;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(signName, px, sY + padY + nameH / 2);

    // Divider + ranking inside sign
    if (top3.length > 0) {
      ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5;
      const divY = sY + padY + nameH + divH / 2;
      ctx.beginPath();
      ctx.moveTo(sX + 12, divY); ctx.lineTo(sX + sW - 12, divY);
      ctx.stroke();

      ctx.font = rankFont;
      top3.forEach((r, i) => {
        const label = `${r.rank}. ${r.name}${r.rank > 1 ? "  +" + r.delta + "s" : ""}`;
        ctx.fillStyle = "#000";
        ctx.fillText(label, px, sY + padY + nameH + divH + rowH * i + rowH / 2);
      });
    }
  }

  // ── Image export (transparent PNG, Instagram-style) ───────────────────────

  async function exportImage(card, btn, myDeviceId) {
    const d = card._exportData;
    if (!d) { alert("Öffne die Fahrt zuerst."); return; }
    btn.innerHTML = "Erstelle…"; btn.disabled = true;

    try {
      // Get road-matched route + ranking data in parallel
      const [routePoints, rankingsData] = await Promise.all([
        matchToRoads(d.track).catch(() => d.track.map(p => [p[0], p[1]])),
        Promise.all(d.crossings.map(c => buildRankingData(c.sign_id, c.timestamp, myDeviceId)))
      ]);

      // Canvas: 1080×1350 (Instagram 4:5 portrait)
      const W = 1080, H = 1350;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, W, H); // transparent background

      // Bounding box of route
      let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
      for (const p of routePoints) {
        minLat = Math.min(minLat, p[0]); maxLat = Math.max(maxLat, p[0]);
        minLon = Math.min(minLon, p[1]); maxLon = Math.max(maxLon, p[1]);
      }

      const PAD  = 160;
      const usW  = W - 2 * PAD;
      const usH  = H - 2 * PAD;
      const scX  = usW / (maxLon - minLon || 0.001);
      const scY  = usH / (maxLat - minLat || 0.001);
      const sc   = Math.min(scX, scY);
      const offX = PAD + (usW - (maxLon - minLon) * sc) / 2;
      const offY = PAD + (usH - (maxLat - minLat) * sc) / 2;

      const toX = lon => offX + (lon - minLon) * sc;
      const toY = lat => offY + (maxLat - lat) * sc;

      // Route line
      ctx.beginPath();
      ctx.strokeStyle = "#000";
      ctx.lineWidth   = 8;
      ctx.lineCap     = "round";
      ctx.lineJoin    = "round";
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur  = 10;
      routePoints.forEach((p, i) => {
        const x = toX(p[1]), y = toY(p[0]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Start dot
      ctx.beginPath();
      ctx.arc(toX(routePoints[0][1]), toY(routePoints[0][0]), 14, 0, Math.PI * 2);
      ctx.fillStyle = "#00C853"; ctx.fill();
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();

      // End dot
      const ep = routePoints[routePoints.length - 1];
      ctx.beginPath();
      ctx.arc(toX(ep[1]), toY(ep[0]), 14, 0, Math.PI * 2);
      ctx.fillStyle = "#FF5252"; ctx.fill();
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();

      // Ortsschild markers
      for (let i = 0; i < d.crossings.length; i++) {
        const c = d.crossings[i];
        let nearest = null, minDiff = Infinity;
        for (const p of d.track) {
          const dd = Math.abs(p[2] - c.timestamp);
          if (dd < minDiff) { minDiff = dd; nearest = p; }
        }
        if (!nearest) continue;
        drawSignMarker(ctx, toX(nearest[1]), toY(nearest[0]), c.sign_name, rankingsData[i]);
      }

      // Download PNG
      canvas.toBlob(blob => {
        const a = document.createElement("a");
        a.href     = URL.createObjectURL(blob);
        a.download = `ortsschilder-sprint-${d.ride.started_at}.png`;
        a.click();
      }, "image/png");

    } catch(e) {
      alert("Fehler: " + e.message);
    } finally {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>Share';
      btn.disabled = false;
    }
  }

  // ── Main App ──────────────────────────────────────────────────────────────

  async function loadApp(myDeviceId) {
    const root = document.getElementById("root");

    try {
      const url = myDeviceId
        ? `/rest/v1/rides?device_id=eq.${encodeURIComponent(myDeviceId)}&select=id,device_id,started_at,ended_at&order=started_at.desc&limit=50`
        : `/rest/v1/rides?select=id,device_id,started_at,ended_at&order=started_at.desc&limit=50`;

      const rides = await fetchJSON(url);

      if (rides.length === 0) {
        root.innerHTML = '<div class="loading">Noch keine Fahrten — beende eine Aktivität auf dem Garmin.</div>';
        return;
      }

      root.innerHTML = "";
      const list = document.createElement("div");
      list.className = "ride-list";

      for (const ride of rides) {
        const dur  = ride.ended_at - ride.started_at;
        const card = document.createElement("div");
        card.className = "ride-card";
        card.innerHTML = `
          <div class="ride-header">
            <div>
              <div class="ride-title">${fmtTime(ride.started_at)}</div>
              <div class="ride-meta">${fmtDuration(dur)}</div>
            </div>
            <div class="toggle-icon">▼</div>
          </div>
          <div class="ride-body">
            <div class="map-container" id="map-${ride.id}"></div>
            <div class="ride-actions">
              <button class="btn btn-image"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>Share</button>
              <button class="btn btn-delete">Löschen</button>
            </div>
          </div>`;

        const header = card.querySelector(".ride-header");
        const mapEl  = card.querySelector(".map-container");
        const btnImg = card.querySelector(".btn-image");
        const btnDel = card.querySelector(".btn-delete");
        let loaded = false;

        header.addEventListener("click", async () => {
          card.classList.toggle("open");
          if (card.classList.contains("open") && !loaded) {
            loaded = true;
            try {
              const { track, crossings } = await buildMap(ride, mapEl, myDeviceId);
              card._exportData = { ride, track, crossings };
            } catch(e) {
              mapEl.innerHTML = `<div class="error">Fehler: ${e.message}</div>`;
            }
          }
        });

        btnImg.addEventListener("click", () => exportImage(card, btnImg, myDeviceId));
        btnDel.addEventListener("click", async () => {
          if (!confirm("Fahrt löschen?")) return;
          await fetch(SUPABASE_URL + `/rest/v1/rides?id=eq.${ride.id}`, {
            method: "DELETE",
            headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
          });
          card.remove();
        });

        list.appendChild(card);
      }

      root.appendChild(list);
    } catch(e) {
      root.innerHTML = `<div class="error">Verbindungsfehler: ${e.message}</div>`;
    }
  }
</script>
