<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ortsschildersprint</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:        #08080a;
      --surface:   #0d0d10;
      --surface2:  #131316;
      --surface3:  #1a1a1e;
      --border:    #1e1e26;
      --border2:   #28282f;
      --yellow:    #FFCC00;
      --yellow-lo: rgba(255,204,0,0.07);
      --yellow-mid:rgba(255,204,0,0.14);
      --red:       #ff4444;
      --green:     #00e676;
      --text:      #f0f0ec;
      --text2:     #999;
      --text3:     #585858;
      --r:         10px;
      --fd:        'Bebas Neue', sans-serif;
      --fb:        'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--yellow) 50%, transparent 100%);
    }

    /* Full-width racing scene SVG */
    .header-scene {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Cyclists group — slides right on hover (app mode only) */
    .cyclists-group {
      transition: transform 1s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.4s;
      opacity: 0.5;
    }
    header.app-mode:hover .cyclists-group {
      transform: translateX(130px);
      opacity: 1;
    }

    /* Speed lines — brighten on hover (app mode only) */
    .speed-lines line {
      transition: opacity 0.4s;
    }
    header.app-mode:hover .speed-lines line {
      opacity: 0.35 !important;
    }

    /* Sign — glow pulse on hover (app mode only) */
    @keyframes sign-pulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(255,204,0,0.3)); }
      50%       { filter: drop-shadow(0 0 20px rgba(255,204,0,0.75)); }
    }
    header.app-mode:hover .sign-group {
      animation: sign-pulse 0.9s ease-in-out infinite;
    }

    /* Menu open: cyclists sprint fully off right edge */
    header.menu-open .cyclists-group {
      transform: translateX(1000px) !important;
      transition: transform 0.85s cubic-bezier(0.55, 0, 0.85, 0.4), opacity 0.4s !important;
      opacity: 1;
    }
    /* Rear cyclist: transition only on menu-open (outward), instant return */
    header.menu-open .cyclist-back {
      transform: translateX(-70px);
      transition: transform 0.6s cubic-bezier(0.6, 0, 0.9, 0.5);
    }
    header.menu-open .speed-lines line {
      opacity: 0.45 !important;
    }

    /* ══════════════════════════════════════
       HAMBURGER BUTTON
    ══════════════════════════════════════ */
    .hamburger-btn {
      position: absolute;
      top: 14px;
      left: 14px;
      transform: none;
      background: rgba(13,13,16,0.7);
      border: 1px solid var(--border2);
      border-radius: 8px;
      cursor: pointer;
      padding: 9px 10px;
      display: none;
      flex-direction: column;
      gap: 5px;
      z-index: 10;
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(6px);
    }
    .hamburger-btn.visible { display: flex; }
    .hamburger-btn:hover {
      background: rgba(255,204,0,0.1);
      border-color: var(--yellow);
    }
    .hamburger-btn span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text2);
      border-radius: 2px;
      transition: background 0.2s, transform 0.3s, opacity 0.3s;
    }
    .hamburger-btn:hover span { background: var(--yellow); }
    .hamburger-btn.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger-btn.is-open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ══════════════════════════════════════
       SIDEBAR + OVERLAY
    ══════════════════════════════════════ */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      z-index: 999;
      opacity: 0;
      pointer-events: none; /* niemals Mausevents abfangen — verhindert Flackern */
      transition: opacity 0.35s;
    }
    .sidebar-overlay.open { opacity: 1; pointer-events: auto; }

    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 268px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border2);
      z-index: 1000;
      transform: translateX(-100%);
      transition: transform 0.55s cubic-bezier(0.22, 0.61, 0.36, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-profile {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.5rem 1.6rem;
    }
    .sidebar-big-avatar {
      width: 54px; height: 54px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--fd);
      font-size: 1.7rem;
      color: #000;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(255,204,0,0.25);
    }
    .sidebar-username {
      font-family: var(--fd);
      font-size: 1.5rem;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .sidebar-device-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
    }
    .sidebar-device-id {
      font-size: 0.72rem;
      color: var(--text3);
      font-family: var(--fb);
      letter-spacing: 0.03em;
    }
    .sidebar-edit-btn {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 2px;
      line-height: 0;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .sidebar-edit-btn:hover { color: var(--yellow); }

    .sidebar-device-edit {
      display: none;
      margin-top: 10px;
    }
    .sidebar-device-edit.active { display: block; }

    .sidebar-edit-input {
      width: 100%;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-family: var(--fb);
      font-size: 0.8rem;
      outline: none;
      margin-bottom: 7px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .sidebar-edit-input:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px var(--yellow-lo);
    }
    .sidebar-edit-actions { display: flex; gap: 6px; }
    .sidebar-save-btn {
      flex: 1;
      background: var(--yellow);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 0.42rem 0;
      font-family: var(--fd);
      font-size: 1rem;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sidebar-save-btn:hover { background: #f5c400; }
    .sidebar-save-btn:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
    .sidebar-cancel-btn {
      background: none;
      color: var(--text2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 0.42rem 0.75rem;
      font-family: var(--fb);
      font-size: 0.78rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .sidebar-cancel-btn:hover { color: var(--text); border-color: var(--text2); }
    .sidebar-edit-msg {
      font-size: 0.73rem;
      margin-top: 5px;
      display: none;
      line-height: 1.4;
    }

    .sidebar-nav {
      flex: 1;
      padding: 0.6rem 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1.5rem;
      color: var(--text2);
      font-size: 0.88rem;
      font-family: var(--fb);
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar-item:hover {
      background: var(--yellow-lo);
      color: var(--text);
    }
    .sidebar-item.logout:hover {
      background: rgba(255,68,68,0.07);
      color: var(--red);
    }
    .sidebar-item svg { opacity: 0.55; flex-shrink: 0; }

    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .sidebar-wordmark {
      font-family: var(--fd);
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      color: var(--text3);
    }

    /* ══════════════════════════════════════
       AUTH SCREEN
    ══════════════════════════════════════ */
    #auth-screen {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1.5rem 4rem;
      min-height: calc(100vh - 170px);
    }

    .auth-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-top: 2px solid var(--yellow);
      border-radius: 14px;
      padding: 2rem 1.8rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: fadeDown 0.3s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-card h2 {
      font-family: var(--fd);
      font-size: 2.2rem;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 1.4rem;
    }

    .auth-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.72rem 0.9rem;
      color: var(--text);
      font-family: var(--fb);
      font-size: 0.88rem;
      margin-bottom: 0.55rem;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .auth-input:focus {
      border-color: var(--yellow);
      background: var(--surface3);
      box-shadow: 0 0 0 3px var(--yellow-lo);
    }
    .auth-input::placeholder { color: var(--text3); }

    .btn-primary {
      width: 100%;
      background: var(--yellow);
      color: #000;
      font-family: var(--fd);
      font-size: 1.25rem;
      letter-spacing: 0.1em;
      border: none;
      border-radius: 8px;
      padding: 0.72rem 1rem;
      cursor: pointer;
      margin-bottom: 0.8rem;
      margin-top: 0.3rem;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    }
    .btn-primary:hover {
      background: #f5c400;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,204,0,0.25);
    }
    .btn-primary:active { transform: translateY(0); box-shadow: none; }
    .btn-primary:disabled {
      background: var(--surface3);
      color: var(--text3);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .auth-switch {
      text-align: center;
      color: var(--text3);
      font-size: 0.8rem;
      margin-top: 0.2rem;
    }
    .auth-switch a { color: var(--yellow); cursor: pointer; text-decoration: none; font-weight: 600; }
    .auth-switch a:hover { text-decoration: underline; }

    .auth-error {
      background: rgba(255,68,68,0.07);
      border: 1px solid rgba(255,68,68,0.25);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      color: var(--red);
      font-size: 0.8rem;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }
    .auth-info {
      background: rgba(0,230,118,0.07);
      border: 1px solid rgba(0,230,118,0.25);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      color: var(--green);
      font-size: 0.8rem;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    /* ══════════════════════════════════════
       APP SCREEN
    ══════════════════════════════════════ */
    #app-screen { display: none; }

    .app-bar {
      display: none;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 0.25rem 0.75rem 0.25rem 0.5rem;
    }
    .user-avatar {
      width: 20px; height: 20px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--fd);
      font-size: 0.7rem;
      color: #000;
      flex-shrink: 0;
    }
    .user-info {
      font-size: 0.78rem;
      color: var(--text2);
      font-weight: 500;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text2);
      padding: 0.28rem 0.8rem;
      font-size: 0.75rem;
      font-family: var(--fb);
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* ══════════════════════════════════════
       FEATURED RIDE (Hauptscreen)
    ══════════════════════════════════════ */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.6rem 1rem 3rem;
    }

    @keyframes rideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .featured-ride {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--yellow);
      border-radius: var(--r);
      overflow: hidden;
      animation: rideIn 0.3s ease both;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .featured-info {
      padding: 1.1rem 1.3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .featured-title {
      font-family: var(--fd);
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 3px;
    }
    .featured-meta {
      font-size: 0.78rem;
      color: var(--text2);
    }
    .map-container {
      height: 360px;
    }
    .map-container .leaflet-container { background: #0e0e14; }

    .ride-actions {
      padding: 0.65rem 1.1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      background: var(--surface2);
    }

    /* ══════════════════════════════════════
       SIDEBAR RIDES LIST
    ══════════════════════════════════════ */
    .sidebar-rides {
      flex: 1 1 0;       /* wächst, aber schrumpft auch — kein min-height-Problem */
      min-height: 0;     /* wichtig: erlaubt Flex-Kind kleiner als Content zu werden */
      overflow-y: auto;
      padding: 0.3rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .sidebar-rides::-webkit-scrollbar { width: 3px; }
    .sidebar-rides::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .sidebar-rides-empty {
      padding: 2rem 1.5rem;
      color: var(--text3);
      font-size: 0.78rem;
      text-align: center;
    }

    .sidebar-ride-item {
      padding: 0.72rem 1.3rem;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .sidebar-ride-item:hover {
      background: var(--surface2);
      border-left-color: var(--yellow);
    }
    .sidebar-ride-item.active {
      background: var(--yellow-lo);
      border-left-color: var(--yellow);
    }
    .sidebar-ride-date {
      font-family: var(--fd);
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 2px;
    }
    .sidebar-ride-dur {
      font-size: 0.72rem;
      color: var(--text2);
    }

    /* Profil + Footer nie schrumpfen */
    .sidebar-profile      { flex-shrink: 0; }
    .sidebar-footer-area  { flex-shrink: 0; padding-bottom: 0.4rem; }
    .sidebar-wordmark {
      font-family: var(--fd);
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      color: var(--text3);
      text-align: center;
      padding: 0.5rem 1.5rem 0.8rem;
    }

    .btn {
      padding: 0.42rem 1rem;
      border-radius: 7px;
      font-size: 0.78rem;
      font-family: var(--fb);
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }

    .btn-image {
      background: var(--yellow);
      color: #000;
    }
    .btn-image:hover {
      background: #f5c400;
      box-shadow: 0 4px 16px rgba(255,204,0,0.3);
    }
    .btn-image:disabled {
      background: var(--surface3);
      color: var(--text2);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-delete {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-delete:hover {
      background: rgba(255,68,68,0.08);
      color: var(--red);
      border-color: rgba(255,68,68,0.25);
    }

    /* ══════════════════════════════════════
       STATES
    ══════════════════════════════════════ */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
      color: var(--text2);
      font-size: 0.85rem;
      gap: 1rem;
    }
    .loading::before {
      content: '';
      width: 28px;
      height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text2);
      font-size: 0.88rem;
      line-height: 1.6;
    }
    .empty-state strong {
      display: block;
      font-family: var(--fd);
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      color: var(--text3);
      margin-bottom: 0.5rem;
    }

    .error {
      color: var(--red);
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
    }

    /* ══════════════════════════════════════
       SIGN POPUP (Leaflet)
    ══════════════════════════════════════ */
    .sign-popup .leaflet-popup-content-wrapper {
      background: var(--yellow);
      border: 4px solid #000;
      border-radius: 12px;
      box-shadow: 3px 3px 0 #888, 0 4px 16px rgba(0,0,0,0.4);
      color: #000;
      min-width: 160px;
    }
    .sign-popup .leaflet-popup-tip-container { display: none; }
    .sign-popup .leaflet-popup-close-button {
      color: #000 !important;
      font-size: 18px !important;
      top: 6px !important;
      right: 8px !important;
    }
    .sign-popup .leaflet-popup-content { margin: 12px 16px; }

    .popup-sign-title {
      font-family: var(--fd);
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      color: #000;
      text-align: center;
      padding-bottom: 8px;
      margin-bottom: 8px;
      border-bottom: 2px solid #000;
    }
    .popup-sign-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: #000;
      gap: 12px;
    }
    .popup-sign-row.me { font-weight: 800; }
    .popup-sign-delta { font-weight: 400; color: #333; }
    .popup-sign-loading { color: #555; font-size: 0.8rem; text-align: center; padding: 4px 0; }
  </style>
</head>
<body>

<!-- ══ Header ══ -->
<header id="main-header">
  <svg class="header-scene" viewBox="0 0 900 210" fill="none" xmlns="http://www.w3.org/2000/svg"
       stroke-linecap="round" stroke-linejoin="round">
    <defs>
      <!-- Pfosten -->
      <linearGradient id="pole-g" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#b0b0b0"/>

<script>
  const SUPABASE_URL = "https://slcprtkqkqwgstnyfpus.supabase.co";
  const SUPABASE_KEY = "sb_publishable_xeoJUHq3BEvCJbHdvgjQsg_yHyvhXUJ";

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Helpers ──────────────────────────────────────────────────────────────

  async function fetchJSON(path) {
    const sess = (await sb.auth.getSession()).data.session;
    const key  = sess ? sess.access_token : SUPABASE_KEY;
    const res  = await fetch(SUPABASE_URL + path, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + key }
    });
    if (!res.ok) throw new Error(res.status + " " + res.statusText);
    return res.json();
  }

  function fmtTime(ts) {
    return new Date(ts * 1000).toLocaleString("de-DE",
      { weekday:"short", day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
  }
  function fmtDuration(sec) {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
    return h > 0 ? `${h}h ${m}min` : `${m} min`;
  }
  function shortId(id) { return id ? "…" + id.slice(-6) : "?"; }

  // ── Auth UI ───────────────────────────────────────────────────────────────

  function showView(id) {
    ["login-view","register-view","reset-view"].forEach(v =>
      document.getElementById(v).style.display = v === id ? "block" : "none"
    );
  }

  document.getElementById("to-register").addEventListener("click", e => { e.preventDefault(); showView("register-view"); });
  document.getElementById("to-login").addEventListener("click",    e => { e.preventDefault(); showView("login-view"); });
  document.getElementById("to-reset").addEventListener("click",    e => { e.preventDefault(); showView("reset-view"); });
  document.getElementById("to-login-from-reset").addEventListener("click", e => { e.preventDefault(); showView("login-view"); });

  document.getElementById("btn-reset").addEventListener("click", async () => {
    const email  = document.getElementById("reset-email").value.trim();
    const errEl  = document.getElementById("reset-error");
    const infoEl = document.getElementById("reset-info");
    const btn    = document.getElementById("btn-reset");
    errEl.style.display = "none";
    infoEl.style.display = "none";

    if (!email) {
      errEl.textContent = "Bitte E-Mail eingeben";
      errEl.style.display = "block";
      return;
    }

    btn.textContent = "Sende…";
    btn.disabled = true;

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: "https://85tvcgwnjr-jpg.github.io/ortsschildersprint/"
    });

    btn.textContent = "Link senden";
    btn.disabled = false;

    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = "block";
    } else {
      infoEl.textContent = "✓ Link gesendet! Bitte E-Mail prüfen";
      infoEl.style.display = "block";
      document.getElementById("reset-email").value = "";
    }
  });

  document.getElementById("reset-email").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("btn-reset").click();
  });

  document.getElementById("btn-login").addEventListener("click", async () => {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl    = document.getElementById("login-error");
    errEl.style.display = "none";

    if (!email || !password) {
      errEl.textContent = "Bitte E-Mail und Passwort eingeben";
      errEl.style.display = "block";
      return;
    }

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = "block";
    }
  });

  document.getElementById("btn-register").addEventListener("click", async () => {
    const name     = document.getElementById("reg-name").value.trim();
    const email    = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    const deviceId = document.getElementById("reg-device").value.trim();
    const errEl    = document.getElementById("reg-error");
    const infoEl   = document.getElementById("reg-info");
    errEl.style.display = "none";
    infoEl.style.display = "none";

    if (!name || !email || !password || !deviceId) {
      errEl.textContent = "Bitte alle Felder ausfüllen";
      errEl.style.display = "block";
      return;
    }

    const { error } = await sb.auth.signUp({
      email, password,
      options: {
        data: { display_name: name, device_id: deviceId },
        emailRedirectTo: "https://85tvcgwnjr-jpg.github.io/ortsschildersprint/"
      }
    });

    if (error) {
      const msg = error.message.toLowerCase();
      errEl.textContent = (msg.includes("rate") || msg.includes("limit"))
        ? "Versuche es später erneut"
        : (msg.includes("already") || msg.includes("registered") || msg.includes("existing"))
        ? "Ein Konto mit dieser E-Mail-Adresse existiert bereits"
        : error.message;
      errEl.style.display = "block";
    } else {
      infoEl.textContent = "✓ Registriert! Bitte E-Mail bestätigen";
      infoEl.style.display = "block";
      document.getElementById("reg-name").value     = "";
      document.getElementById("reg-email").value    = "";
      document.getElementById("reg-password").value = "";
      document.getElementById("reg-device").value   = "";
    }
  });

  document.getElementById("btn-logout").addEventListener("click", () => sb.auth.signOut());

  // ── Sidebar ───────────────────────────────────────────────────────────────

  const header       = document.getElementById("main-header");
  const sidebar      = document.getElementById("sidebar");
  const sidebarOver  = document.getElementById("sidebar-overlay");
  const hamburgerBtn = document.getElementById("hamburger-btn");

  function openSidebar() {
    sidebar.classList.add("open");
    sidebarOver.classList.add("open");
    header.classList.add("menu-open");
    hamburgerBtn.classList.add("is-open");
  }
  function closeSidebar() {
    sidebar.classList.remove("open");
    sidebarOver.classList.remove("open");
    header.classList.remove("menu-open");
    hamburgerBtn.classList.remove("is-open");
  }

  // Sidebar öffnet/schließt per Hover über den Header-Banner
  let closeTimer = null;

  function scheduleClose() {
    clearTimeout(closeTimer);
    closeTimer = setTimeout(closeSidebar, 180);
  }
  function cancelClose() {
    clearTimeout(closeTimer);
  }

  function isInSidebar(node) { return node && (node === sidebar || sidebar.contains(node)); }
  function isInHeader(node)  { return node && (node === header  || header.contains(node));  }

  header.addEventListener("mouseenter", () => {
    if (!header.classList.contains("app-mode")) return;
    cancelClose();
    openSidebar();
  });
  header.addEventListener("mouseleave", (e) => {
    // Maus wechselt zur Sidebar → nicht schließen
    if (isInSidebar(e.relatedTarget)) { cancelClose(); return; }
    scheduleClose();
  });

  sidebar.addEventListener("mouseenter", cancelClose);
  sidebar.addEventListener("mouseleave", (e) => {
    // Maus wechselt zurück zum Header → nicht schließen
    if (isInHeader(e.relatedTarget)) { cancelClose(); return; }
    scheduleClose();
  });

  // Klick auf Overlay (= außerhalb Sidebar + Header) schließt sofort
  sidebarOver.addEventListener("click", () => { clearTimeout(closeTimer); closeSidebar(); });

  document.getElementById("sidebar-logout").addEventListener("click", () => {
    closeSidebar();
    sb.auth.signOut();
  });

  // ── Geräte-ID bearbeiten ──────────────────────────────────────────────────

  document.getElementById("sidebar-edit-btn").addEventListener("click", () => {
    const editArea = document.getElementById("sidebar-device-edit");
    const input    = document.getElementById("sidebar-device-input");
    const msgEl    = document.getElementById("sidebar-edit-msg");
    const current  = document.getElementById("sidebar-device").textContent.replace("Gerät: ", "");
    input.value = current;
    msgEl.style.display = "none";
    editArea.classList.toggle("active");
    if (editArea.classList.contains("active")) {
      input.focus();
      input.select();
    }
  });

  document.getElementById("sidebar-cancel-device").addEventListener("click", () => {
    document.getElementById("sidebar-device-edit").classList.remove("active");
    document.getElementById("sidebar-edit-msg").style.display = "none";
  });

  document.getElementById("sidebar-save-device").addEventListener("click", async () => {
    const newDevice = document.getElementById("sidebar-device-input").value.trim();
    const msgEl     = document.getElementById("sidebar-edit-msg");
    const saveBtn   = document.getElementById("sidebar-save-device");

    if (!newDevice) {
      msgEl.textContent = "Bitte eine Geräte-ID eingeben";
      msgEl.style.color = "var(--red)";
      msgEl.style.display = "block";
      return;
    }

    saveBtn.textContent = "…";
    saveBtn.disabled = true;
    msgEl.style.display = "none";

    try {
      const { data, error } = await sb.auth.updateUser({
        data: { device_id: newDevice }
      });
      if (error) throw error;

      const displayName = data.user.user_metadata?.display_name || "";
      const sess = (await sb.auth.getSession()).data.session;

      // Profiles-Tabelle aktualisieren
      if (displayName && sess) {
        await fetch(SUPABASE_URL + "/rest/v1/profiles", {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + sess.access_token,
            "Content-Type": "application/json",
            "Prefer": "resolution=merge-duplicates"
          },
          body: JSON.stringify({ device_id: newDevice, display_name: displayName, updated_at: new Date().toISOString() })
        }).catch(() => {});
      }

      // UI aktualisieren
      document.getElementById("sidebar-device").textContent = "Gerät: " + newDevice;
      document.getElementById("sidebar-device-edit").classList.remove("active");

      // Fahrten mit neuer ID neu laden
      const root = document.getElementById("root");
      root.className = "loading";
      root.textContent = "Lade Fahrten…";
      loadApp(newDevice);

    } catch (e) {
      msgEl.textContent = "Fehler: " + e.message;
      msgEl.style.color = "var(--red)";
      msgEl.style.display = "block";
    } finally {
      saveBtn.textContent = "Speichern";
      saveBtn.disabled = false;
    }
  });

  // Enter-Taste im Input = Speichern
  document.getElementById("sidebar-device-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("sidebar-save-device").click();
    if (e.key === "Escape") document.getElementById("sidebar-cancel-device").click();
  });

  // ── Auth State ────────────────────────────────────────────────────────────

  sb.auth.onAuthStateChange(async (_event, session) => {
    if (session) {
      document.getElementById("auth-screen").style.display = "none";
      document.getElementById("app-screen").style.display  = "block";
      const displayName = session.user.user_metadata?.display_name || session.user.email;
      const deviceId    = session.user.user_metadata?.device_id || "";
      document.getElementById("user-info").textContent = displayName;
      document.getElementById("user-avatar").textContent = displayName ? displayName[0].toUpperCase() : "?";

      // Sidebar user info
      const initial = displayName ? displayName[0].toUpperCase() : "?";
      document.getElementById("sidebar-avatar").textContent = initial;
      document.getElementById("sidebar-name").textContent   = displayName || "";
      document.getElementById("sidebar-device").textContent = deviceId ? "Gerät: " + deviceId : "";

      // Aktiviere Animations- und Hamburger-Modus
      header.classList.add("app-mode");
      hamburgerBtn.classList.add("visible");

      // Upsert profile so rankings can show names
      if (deviceId && displayName) {
        fetch(SUPABASE_URL + "/rest/v1/profiles", {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + session.access_token,
            "Content-Type": "application/json",
            "Prefer": "resolution=merge-duplicates"
          },
          body: JSON.stringify({ device_id: deviceId, display_name: displayName, updated_at: new Date().toISOString() })
        }).catch(() => {});
      }

      loadApp(deviceId);
    } else {
      closeSidebar();
      header.classList.remove("app-mode");
      hamburgerBtn.classList.remove("visible");
      document.getElementById("auth-screen").style.display = "flex";
      document.getElementById("app-screen").style.display  = "none";
      document.getElementById("root").innerHTML = '<div class="loading">Lade Fahrten…</div>';
    }
  });

  // ── Ranking popup ─────────────────────────────────────────────────────────

  async function loadProfiles(deviceIds) {
    if (!deviceIds.length) return {};
    try {
      const rows = await fetchJSON(`/rest/v1/profiles?device_id=in.(${encodeURIComponent(deviceIds.join(","))})&select=device_id,display_name`);
      const map = {};
      for (const r of rows) map[r.device_id] = r.display_name;
      return map;
    } catch(e) { return {}; }
  }

  async function buildRankingHtml(signId, crossingTs, myDeviceId) {
    const tFrom = crossingTs - 30;
    const tTo   = crossingTs + 30;
    const rows  = await fetchJSON(
      `/rest/v1/crossings?sign_id=eq.${encodeURIComponent(signId)}` +
      `&timestamp=gte.${tFrom}&timestamp=lte.${tTo}` +
      `&order=timestamp.asc&limit=50&select=device_id,timestamp`
    );
    const best = {};
    for (const r of rows) {
      if (!best[r.device_id] || r.timestamp < best[r.device_id])
        best[r.device_id] = r.timestamp;
    }
    let leaderTs = crossingTs;
    for (const ts of Object.values(best)) { if (ts < leaderTs) leaderTs = ts; }
    const cutoff = leaderTs + 30;
    const group  = Object.entries(best)
      .filter(([, ts]) => ts <= cutoff)
      .sort(([, a], [, b]) => a - b);
    if (group.length === 0) return '<div class="popup-sign-loading">Keine Daten</div>';

    const profiles = await loadProfiles(group.map(([dev]) => dev));

    return group.map(([dev, ts], i) => {
      const delta    = (ts - leaderTs).toFixed(1);
      const isMe     = myDeviceId && dev === myDeviceId;
      const devName  = isMe ? "Du" : (profiles[dev] || dev);
      const deltaStr = i === 0 ? "" : `<span class="popup-sign-delta">+${delta}s</span>`;
      return `<div class="popup-sign-row ${isMe ? "me" : ""}">
        <span>${i+1}. ${devName}</span>${deltaStr}
      </div>`;
    }).join("");
  }

  // ── Road matching ─────────────────────────────────────────────────────────

  async function matchToRoads(track) {
    const MAX = 99;
    let pts = track;
    if (pts.length > MAX) {
      const out = [];
      for (let i = 0; i < MAX; i++) out.push(pts[Math.floor(i * pts.length / MAX)]);
      out.push(pts[pts.length - 1]);
      pts = out;
    }
    const coords = pts.map(p => `${p[1]},${p[0]}`).join(';');
    const res = await fetch(
      `https://router.project-osrm.org/route/v1/cycling/${coords}?overview=full&geometries=geojson`
    );
    if (!res.ok) throw new Error('OSRM ' + res.status);
    const data = await res.json();
    if (data.code !== 'Ok' || !data.routes?.length) throw new Error('no route');
    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
  }

  // ── Map ───────────────────────────────────────────────────────────────────

  async function buildMap(ride, mapEl, myDeviceId) {
    const [rideData, crossings] = await Promise.all([
      fetchJSON(`/rest/v1/rides?id=eq.${ride.id}&select=gps_track`),
      fetchJSON(
        `/rest/v1/crossings?device_id=eq.${encodeURIComponent(ride.device_id)}` +
        `&timestamp=gte.${ride.started_at}&timestamp=lte.${ride.ended_at}` +
        `&order=timestamp.asc&select=sign_id,sign_name,timestamp`
      )
    ]);
    const track = rideData[0]?.gps_track || [];
    const map   = L.map(mapEl);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap", maxZoom: 19
    }).addTo(map);
    if (track.length >= 2) {
      let routePoints = track.map(p => [p[0], p[1]]);
      try { routePoints = await matchToRoads(track); } catch(e) {}
      const line = L.polyline(routePoints, { color: "#FFCC00", weight: 3 }).addTo(map);
      map.fitBounds(line.getBounds(), { padding:[20,20] });
    }
    for (const c of crossings) {
      const approxW = Math.round(c.sign_name.length * 5.5 + 14);
      const signIcon = L.divIcon({
        html: `<div style="display:flex;flex-direction:column;align-items:center;">
          <div style="
            background:#FFCC00;
            border:2.5px solid #444;
            border-radius:4px;
            padding:2px 6px;
            font-size:9px;
            font-weight:700;
            color:#000;
            white-space:nowrap;
            font-family:-apple-system,sans-serif;
            line-height:1.4;
            box-shadow:2px 2px 0 #888, 0 2px 6px rgba(0,0,0,0.35);
          ">${c.sign_name}</div>
          <div style="
            width:3px;
            height:14px;
            background:linear-gradient(to right,#ccc,#888,#ccc);
            border-radius:0 0 2px 2px;
          "></div>
        </div>`,
        className: "",
        iconAnchor: [Math.round(approxW / 2), 30]
      });
      let nearest = null, minDiff = Infinity;
      for (const p of track) {
        const d = Math.abs(p[2] - c.timestamp);
        if (d < minDiff) { minDiff = d; nearest = p; }
      }
      if (!nearest) continue;
      const marker = L.marker([nearest[0], nearest[1]], { icon: signIcon }).addTo(map);
      const title  = `<div class="popup-sign-title">${c.sign_name}</div>`;
      marker.bindPopup(
        title + `<div class="popup-sign-loading">Lade…</div>`,
        { maxWidth: 260, className: "sign-popup" }
      );
      marker.on("popupopen", async () => {
        try {
          const html = await buildRankingHtml(c.sign_id, c.timestamp, myDeviceId);
          marker.getPopup().setContent(title + html);
        } catch(e) {
          marker.getPopup().setContent(title + `<div class="popup-sign-loading" style="color:#c00">Fehler</div>`);
        }
      });
    }
    return { track, crossings, map };
  }

  // ── Ranking data (structured, for image export) ───────────────────────────

  async function buildRankingData(signId, crossingTs, myDeviceId) {
    try {
      const tFrom = crossingTs - 30, tTo = crossingTs + 30;
      const rows = await fetchJSON(
        `/rest/v1/crossings?sign_id=eq.${encodeURIComponent(signId)}` +
        `&timestamp=gte.${tFrom}&timestamp=lte.${tTo}&order=timestamp.asc&limit=50&select=device_id,timestamp`
      );
      const best = {};
      for (const r of rows) {
        if (!best[r.device_id] || r.timestamp < best[r.device_id]) best[r.device_id] = r.timestamp;
      }
      let leaderTs = crossingTs;
      for (const ts of Object.values(best)) { if (ts < leaderTs) leaderTs = ts; }
      const group = Object.entries(best).filter(([,ts]) => ts <= leaderTs + 30).sort(([,a],[,b]) => a - b);
      const profiles = await loadProfiles(group.map(([dev]) => dev));
      return group.map(([dev, ts], i) => ({
        name:  myDeviceId && dev === myDeviceId ? "Du" : (profiles[dev] || dev.slice(-6)),
        delta: (ts - leaderTs).toFixed(1),
        isMe:  myDeviceId && dev === myDeviceId,
        rank:  i + 1
      }));
    } catch(e) { return []; }
  }

  // ── Canvas helpers ────────────────────────────────────────────────────────

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawSignMarker(ctx, px, py, signName, ranking) {
    const nameFont = "bold 22px -apple-system, BlinkMacSystemFont, sans-serif";
    const rankFont = "bold 17px -apple-system, BlinkMacSystemFont, sans-serif";
    const top3     = (ranking || []).slice(0, 3);
    const padX = 18, padY = 10, nameH = 28, rowH = 22;
    const divH = top3.length > 0 ? 8 : 0;

    ctx.font = nameFont;
    let maxW = ctx.measureText(signName).width;
    ctx.font = rankFont;
    for (const r of top3) {
      const label = `${r.rank}. ${r.name}${r.rank > 1 ? "  +" + r.delta + "s" : ""}`;
      maxW = Math.max(maxW, ctx.measureText(label).width);
    }

    const sW = maxW + 2 * padX;
    const sH = padY + nameH + divH + top3.length * rowH + padY;
    const sX = px - sW / 2;
    const sY = py - sH - 18;

    // Pole
    const grad = ctx.createLinearGradient(px - 3, 0, px + 3, 0);
    grad.addColorStop(0, "#ccc"); grad.addColorStop(0.5, "#888"); grad.addColorStop(1, "#ccc");
    ctx.fillStyle = grad;
    ctx.fillRect(px - 3, sY + sH, 6, 18);

    // Shadow
    ctx.shadowColor = "rgba(0,0,0,0.35)";
    ctx.shadowBlur = 10; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;

    // Sign fill
    ctx.fillStyle = "#FFCC00";
    roundRect(ctx, sX, sY, sW, sH, 8);
    ctx.fill();

    // Border
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = "#000"; ctx.lineWidth = 3.5;
    roundRect(ctx, sX, sY, sW, sH, 8);
    ctx.stroke();

    // Town name
    ctx.fillStyle = "#000"; ctx.font = nameFont;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(signName, px, sY + padY + nameH / 2);

    // Divider + ranking inside sign
    if (top3.length > 0) {
      ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5;
      const divY = sY + padY + nameH + divH / 2;
      ctx.beginPath();
      ctx.moveTo(sX + 12, divY); ctx.lineTo(sX + sW - 12, divY);
      ctx.stroke();
      ctx.font = rankFont;
      top3.forEach((r, i) => {
        const label = `${r.rank}. ${r.name}${r.rank > 1 ? "  +" + r.delta + "s" : ""}`;
        ctx.fillStyle = "#000";
        ctx.fillText(label, px, sY + padY + nameH + divH + rowH * i + rowH / 2);
      });
    }
  }

  // ── Image export (transparent PNG, Instagram-style) ───────────────────────

  async function exportImage(card, btn, myDeviceId) {
    const d = card._exportData;
    if (!d) { alert("Öffne die Fahrt zuerst"); return; }
    btn.innerHTML = "Erstelle…"; btn.disabled = true;

    try {
      const [routePoints, rankingsData] = await Promise.all([
        matchToRoads(d.track).catch(() => d.track.map(p => [p[0], p[1]])),
        Promise.all(d.crossings.map(c => buildRankingData(c.sign_id, c.timestamp, myDeviceId)))
      ]);

      const W = 1080, H = 1350;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, W, H);

      let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
      for (const p of routePoints) {
        minLat = Math.min(minLat, p[0]); maxLat = Math.max(maxLat, p[0]);
        minLon = Math.min(minLon, p[1]); maxLon = Math.max(maxLon, p[1]);
      }

      const PAD  = 160;
      const usW  = W - 2 * PAD;
      const usH  = H - 2 * PAD;
      const scX  = usW / (maxLon - minLon || 0.001);
      const scY  = usH / (maxLat - minLat || 0.001);
      const sc   = Math.min(scX, scY);
      const offX = PAD + (usW - (maxLon - minLon) * sc) / 2;
      const offY = PAD + (usH - (maxLat - minLat) * sc) / 2;

      const toX = lon => offX + (lon - minLon) * sc;
      const toY = lat => offY + (maxLat - lat) * sc;

      ctx.beginPath();
      ctx.strokeStyle = "#000";
      ctx.lineWidth   = 8;
      ctx.lineCap     = "round";
      ctx.lineJoin    = "round";
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur  = 10;
      routePoints.forEach((p, i) => {
        const x = toX(p[1]), y = toY(p[0]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.shadowBlur = 0;

      for (let i = 0; i < d.crossings.length; i++) {
        const c = d.crossings[i];
        let nearest = null, minDiff = Infinity;
        for (const p of d.track) {
          const dd = Math.abs(p[2] - c.timestamp);
          if (dd < minDiff) { minDiff = dd; nearest = p; }
        }
        if (!nearest) continue;
        drawSignMarker(ctx, toX(nearest[1]), toY(nearest[0]), c.sign_name, rankingsData[i]);
      }

      canvas.toBlob(blob => {
        const a = document.createElement("a");
        a.href     = URL.createObjectURL(blob);
        a.download = `ortsschildersprint-${d.ride.started_at}.png`;
        a.click();
      }, "image/png");

    } catch(e) {
      alert("Fehler: " + e.message);
    } finally {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>Share';
      btn.disabled = false;
    }
  }

  // ── Main App ──────────────────────────────────────────────────────────────

  let activeLeafletMap = null; // aktive Leaflet-Instanz verfolgen
  let allRides = [];           // alle Fahrten cachen
  let activeDeviceId = "";

  const BIKE_SVG = `<img src="imageBike.png" style="width:110px;height:auto;opacity:0.25;margin-bottom:.8rem;display:block;margin-left:auto;margin-right:auto">`;

  async function loadApp(myDeviceId) {
    activeDeviceId = myDeviceId;
    const root = document.getElementById("root");
    root.className = '';

    try {
      const url = myDeviceId
        ? `/rest/v1/rides?device_id=eq.${encodeURIComponent(myDeviceId)}&select=id,device_id,started_at,ended_at&order=started_at.desc&limit=50`
        : `/rest/v1/rides?select=id,device_id,started_at,ended_at&order=started_at.desc&limit=50`;

      allRides = await fetchJSON(url);

      if (allRides.length === 0) {
        root.innerHTML = `<div class="empty-state">${BIKE_SVG}
          <strong>Noch keine Fahrten</strong>
          Beende eine Aktivität auf dem Garmin und sie erscheint hier
        </div>`;
        document.getElementById("sidebar-rides").innerHTML = '';
        return;
      }

      // Neueste Fahrt auf dem Hauptscreen anzeigen
      await renderFeaturedRide(allRides[0]);
      // Restliche Fahrten in der Sidebar
      renderSidebarRides(allRides[0].id);

    } catch(e) {
      root.innerHTML = `<div class="error">Verbindungsfehler: ${e.message}</div>`;
    }
  }

  async function renderFeaturedRide(ride) {
    const root = document.getElementById("root");

    // Alte Leaflet-Karte zerstören
    if (activeLeafletMap) { activeLeafletMap.remove(); activeLeafletMap = null; }

    const dur = ride.ended_at - ride.started_at;
    root.innerHTML = `
      <div class="featured-ride" id="featured-ride">
        <div class="featured-info">
          <div>
            <div class="featured-title">${fmtTime(ride.started_at)}</div>
            <div class="featured-meta">${fmtDuration(dur)}</div>
          </div>
        </div>
        <div class="map-container" id="map-featured"></div>
        <div class="ride-actions">
          <button class="btn btn-image" id="featured-share">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
            Share
          </button>
          <button class="btn btn-delete" id="featured-delete" style="margin-left:auto">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            Löschen
          </button>
        </div>
      </div>`;

    // Karte sofort laden
    const mapEl = document.getElementById("map-featured");
    const featuredEl = document.getElementById("featured-ride");
    try {
      const { track, crossings, map } = await buildMap(ride, mapEl, activeDeviceId);
      activeLeafletMap = map;
      featuredEl._exportData = { ride, track, crossings };
    } catch(e) {
      mapEl.innerHTML = `<div class="error" style="padding:1rem;color:var(--red);font-size:.85rem">Karte konnte nicht geladen werden</div>`;
    }

    document.getElementById("featured-share").addEventListener("click", () =>
      exportImage(featuredEl, document.getElementById("featured-share"), activeDeviceId)
    );

    document.getElementById("featured-delete").addEventListener("click", async () => {
      if (!confirm("Fahrt löschen?")) return;
      const delHeaders = { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY };

      // Eigene Crossings dieser Fahrt laden
      const ownCrossings = await fetchJSON(
        `/rest/v1/crossings?device_id=eq.${encodeURIComponent(ride.device_id)}` +
        `&timestamp=gte.${ride.started_at}&timestamp=lte.${ride.ended_at}` +
        `&select=sign_id,timestamp`
      );

      // Prüfen ob ein anderes Gerät noch einen Crossing-Timestamp braucht:
      // → gibt es für irgendeinen meiner Crossings einen fremden Crossing
      //   am selben Schild im ±30s-Fenster dessen Fahrt noch existiert?
      let otherStillNeeds = false;
      for (const c of ownCrossings) {
        const others = await fetchJSON(
          `/rest/v1/crossings?sign_id=eq.${encodeURIComponent(c.sign_id)}` +
          `&device_id=neq.${encodeURIComponent(ride.device_id)}` +
          `&timestamp=gte.${c.timestamp - 30}&timestamp=lte.${c.timestamp + 30}` +
          `&select=device_id,timestamp&limit=1`
        );
        if (others.length > 0) { otherStillNeeds = true; break; }
      }

      // Crossings löschen wenn: niemand mehr braucht SIE, ODER älter als 7 Tage
      const sevenDaysAgo = Math.floor(Date.now() / 1000) - 7 * 24 * 3600;
      const deletions = [fetch(SUPABASE_URL + `/rest/v1/rides?id=eq.${ride.id}`, { method: "DELETE", headers: delHeaders })];
      if (!otherStillNeeds || ride.ended_at < sevenDaysAgo) {
        deletions.push(fetch(
          SUPABASE_URL + `/rest/v1/crossings?device_id=eq.${encodeURIComponent(ride.device_id)}&timestamp=gte.${ride.started_at}&timestamp=lte.${ride.ended_at}`,
          { method: "DELETE", headers: delHeaders }
        ));
      }
      await Promise.all(deletions);
      allRides = allRides.filter(r => r.id !== ride.id);
      if (allRides.length === 0) {
        loadApp(activeDeviceId);
      } else {
        await renderFeaturedRide(allRides[0]);
        renderSidebarRides(allRides[0].id);
      }
    });
  }

  function renderSidebarRides(activeFeaturedId) {
    const sidebarRides = document.getElementById("sidebar-rides");

    if (allRides.length === 0) {
      sidebarRides.innerHTML = `<div class="sidebar-rides-empty">Keine Fahrten</div>`;
      return;
    }

    sidebarRides.innerHTML = '';
    allRides.forEach(ride => {
      const item = document.createElement("div");
      item.className = "sidebar-ride-item" + (ride.id === activeFeaturedId ? " active" : "");
      item.innerHTML = `<div class="sidebar-ride-date">${fmtTime(ride.started_at)}</div>`;
      item.addEventListener("click", async () => {
        document.querySelectorAll(".sidebar-ride-item").forEach(el => el.classList.remove("active"));
        item.classList.add("active");
        await renderFeaturedRide(ride);
        renderSidebarRides(ride.id);
      });
      sidebarRides.appendChild(item);
    });
  }
</script>
</body>
</html>
