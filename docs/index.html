<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ortsschildersprint</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 104'%3E%3Crect x='37' y='64' width='6' height='40' fill='%23aaa'/%3E%3Crect x='3' y='3' width='74' height='58' rx='11' fill='%23000'/%3E%3Crect x='8' y='8' width='64' height='48' rx='8' fill='%23FFCC00'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:        #08080a;
      --surface:   #0d0d10;
      --surface2:  #131316;
      --surface3:  #1a1a1e;
      --border:    #1e1e26;
      --border2:   #28282f;
      --yellow:    #FFCC00;
      --yellow-lo: rgba(255,204,0,0.07);
      --yellow-mid:rgba(255,204,0,0.14);
      --red:       #ff4444;
      --green:     #00e676;
      --text:      #f0f0ec;
      --text2:     #999;
      --text3:     #585858;
      --r:         10px;
      --fd:        'Bebas Neue', sans-serif;
      --fb:        'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--yellow) 50%, transparent 100%);
    }

    /* Full-width racing scene SVG */
    .header-scene {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Cyclists group — slides right on hover */
    .cyclists-group {
      transition: transform 1s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    header:hover .cyclists-group {
      transform: translateX(130px);
    }

    /* Speed lines — brighten on hover */
    .speed-lines line {
      transition: opacity 0.4s;
    }
    header:hover .speed-lines line {
      opacity: 0.35 !important;
    }

    /* Sign — glow pulse on hover */
    @keyframes sign-pulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(255,204,0,0.3)); }
      50%       { filter: drop-shadow(0 0 20px rgba(255,204,0,0.75)); }
    }
    header:hover .sign-group {
      animation: sign-pulse 0.9s ease-in-out infinite;
    }

    /* ══════════════════════════════════════
       AUTH SCREEN
    ══════════════════════════════════════ */
    #auth-screen {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1.5rem 4rem;
      min-height: calc(100vh - 170px);
    }

    .auth-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-top: 2px solid var(--yellow);
      border-radius: 14px;
      padding: 2rem 1.8rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: fadeDown 0.3s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-card h2 {
      font-family: var(--fd);
      font-size: 2.2rem;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 1.4rem;
    }

    .auth-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.72rem 0.9rem;
      color: var(--text);
      font-family: var(--fb);
      font-size: 0.88rem;
      margin-bottom: 0.55rem;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .auth-input:focus {
      border-color: var(--yellow);
      background: var(--surface3);
      box-shadow: 0 0 0 3px var(--yellow-lo);
    }
    .auth-input::placeholder { color: var(--text3); }

    .btn-primary {
      width: 100%;
      background: var(--yellow);
      color: #000;
      font-family: var(--fd);
      font-size: 1.25rem;
      letter-spacing: 0.1em;
      border: none;
      border-radius: 8px;
      padding: 0.72rem 1rem;
      cursor: pointer;
      margin-bottom: 0.8rem;
      margin-top: 0.3rem;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    }
    .btn-primary:hover {
      background: #f5c400;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,204,0,0.25);
    }
    .btn-primary:active { transform: translateY(0); box-shadow: none; }
    .btn-primary:disabled {
      background: var(--surface3);
      color: var(--text3);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .auth-switch {
      text-align: center;
      color: var(--text3);
      font-size: 0.8rem;
      margin-top: 0.2rem;
    }
    .auth-switch a { color: var(--yellow); cursor: pointer; text-decoration: none; font-weight: 600; }
    .auth-switch a:hover { text-decoration: underline; }

    .auth-error {
      background: rgba(255,68,68,0.07);
      border: 1px solid rgba(255,68,68,0.25);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      color: var(--red);
      font-size: 0.8rem;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }
    .auth-info {
      background: rgba(0,230,118,0.07);
      border: 1px solid rgba(0,230,118,0.25);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      color: var(--green);
      font-size: 0.8rem;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    /* ══════════════════════════════════════
       APP SCREEN
    ══════════════════════════════════════ */
    #app-screen { display: none; }

    .app-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.55rem 1.4rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.9rem;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 0.25rem 0.75rem 0.25rem 0.5rem;
    }
    .user-avatar {
      width: 20px; height: 20px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--fd);
      font-size: 0.7rem;
      color: #000;
      flex-shrink: 0;
    }
    .user-info {
      font-size: 0.78rem;
      color: var(--text2);
      font-weight: 500;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text2);
      padding: 0.28rem 0.8rem;
      font-size: 0.75rem;
      font-family: var(--fb);
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* ══════════════════════════════════════
       RIDE LIST
    ══════════════════════════════════════ */
    .container {
      max-width: 660px;
      margin: 0 auto;
      padding: 1.6rem 1rem 3rem;
    }

    .section-label {
      font-family: var(--fd);
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-left: 2px;
    }

    .ride-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .ride-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: var(--r);
      overflow: hidden;
      transition: border-left-color 0.2s, box-shadow 0.2s, background 0.15s;
      animation: rideIn 0.35s ease both;
    }
    .ride-card:hover {
      border-left-color: var(--yellow);
      box-shadow: 0 4px 28px rgba(255,204,0,0.05);
    }
    .ride-card.open {
      border-left-color: var(--yellow);
      box-shadow: 0 6px 32px rgba(255,204,0,0.08);
    }

    @keyframes rideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ride-card:nth-child(1)  { animation-delay: 0.04s; }
    .ride-card:nth-child(2)  { animation-delay: 0.08s; }
    .ride-card:nth-child(3)  { animation-delay: 0.12s; }
    .ride-card:nth-child(4)  { animation-delay: 0.16s; }
    .ride-card:nth-child(5)  { animation-delay: 0.20s; }
    .ride-card:nth-child(6)  { animation-delay: 0.24s; }
    .ride-card:nth-child(n+7){ animation-delay: 0.28s; }

    .ride-header {
      padding: 0.95rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      gap: 1rem;
    }
    .ride-header:hover { background: rgba(255,255,255,0.015); }

    .ride-title {
      font-family: var(--fd);
      font-size: 1.3rem;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 3px;
    }
    .ride-meta {
      font-size: 0.76rem;
      color: var(--text2);
      font-weight: 400;
    }

    .toggle-icon {
      flex-shrink: 0;
      color: var(--text3);
      transition: transform 0.25s cubic-bezier(.34,1.2,.64,1), color 0.2s;
      display: flex;
      align-items: center;
    }
    .ride-card.open .toggle-icon {
      transform: rotate(180deg);
      color: var(--yellow);
    }

    /* Smooth reveal animation for ride body */
    .ride-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .ride-card.open .ride-body { display: block; }

    .map-container {
      height: 280px;
    }
    .map-container .leaflet-container {
      background: #0e0e14;
    }

    .ride-actions {
      padding: 0.65rem 1.1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      background: var(--surface2);
    }

    .btn {
      padding: 0.42rem 1rem;
      border-radius: 7px;
      font-size: 0.78rem;
      font-family: var(--fb);
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }

    .btn-image {
      background: var(--yellow);
      color: #000;
    }
    .btn-image:hover {
      background: #f5c400;
      box-shadow: 0 4px 16px rgba(255,204,0,0.3);
    }
    .btn-image:disabled {
      background: var(--surface3);
      color: var(--text2);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-delete {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-delete:hover {
      background: rgba(255,68,68,0.08);
      color: var(--red);
      border-color: rgba(255,68,68,0.25);
    }

    /* ══════════════════════════════════════
       STATES
    ══════════════════════════════════════ */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
      color: var(--text2);
      font-size: 0.85rem;
      gap: 1rem;
    }
    .loading::before {
      content: '';
      width: 28px;
      height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text2);
      font-size: 0.88rem;
      line-height: 1.6;
    }
    .empty-state strong {
      display: block;
      font-family: var(--fd);
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      color: var(--text3);
      margin-bottom: 0.5rem;
    }

    .error {
      color: var(--red);
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
    }

    /* ══════════════════════════════════════
       SIGN POPUP (Leaflet)
    ══════════════════════════════════════ */
    .sign-popup .leaflet-popup-content-wrapper {
      background: var(--yellow);
      border: 4px solid #000;
      border-radius: 12px;
      box-shadow: 3px 3px 0 #888, 0 4px 16px rgba(0,0,0,0.4);
      color: #000;
      min-width: 160px;
    }
    .sign-popup .leaflet-popup-tip-container { display: none; }
    .sign-popup .leaflet-popup-close-button {
      color: #000 !important;
      font-size: 18px !important;
      top: 6px !important;
      right: 8px !important;
    }
    .sign-popup .leaflet-popup-content { margin: 12px 16px; }

    .popup-sign-title {
      font-family: var(--fd);
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      color: #000;
      text-align: center;
      padding-bottom: 8px;
      margin-bottom: 8px;
      border-bottom: 2px solid #000;
    }
    .popup-sign-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: #000;
      gap: 12px;
    }
    .popup-sign-row.me { font-weight: 800; }
    .popup-sign-delta { font-weight: 400; color: #333; }
    .popup-sign-loading { color: #555; font-size: 0.8rem; text-align: center; padding: 4px 0; }
  </style>
</head>
<body>

<!-- ══ Header ══ -->
<header>
  <svg class="header-scene" viewBox="0 0 900 210" fill="none" xmlns="http://www.w3.org/2000/svg"
       stroke-linecap="round" stroke-linejoin="round">
    <defs>
      <linearGradient id="pole-g" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ccc"/>
        <stop offset="50%" stop-color="#666"/>
        <stop offset="100%" stop-color="#ccc"/>
      </linearGradient>
      <!-- Subtle background gradient -->
      <linearGradient id="sky-g" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#0a0a0d"/>
        <stop offset="100%" stop-color="#0d0d10"/>
      </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="900" height="210" fill="url(#sky-g)"/>

    <!-- Subtle diagonal racing stripes -->
    <line x1="-20" y1="0" x2="210" y2="210" stroke="#FFCC00" stroke-width="1" opacity="0.022"/>
    <line x1="80"  y1="0" x2="310" y2="210" stroke="#FFCC00" stroke-width="1" opacity="0.022"/>
    <line x1="180" y1="0" x2="410" y2="210" stroke="#FFCC00" stroke-width="1" opacity="0.022"/>
    <line x1="280" y1="0" x2="510" y2="210" stroke="#FFCC00" stroke-width="1" opacity="0.022"/>
    <line x1="380" y1="0" x2="610" y2="210" stroke="#FFCC00" stroke-width="1" opacity="0.022"/>
    <line x1="480" y1="0" x2="710" y2="210" stroke="#FFCC00" stroke-width="1" opacity="0.022"/>
    <line x1="580" y1="0" x2="810" y2="210" stroke="#FFCC00" stroke-width="1" opacity="0.022"/>
    <line x1="680" y1="0" x2="910" y2="210" stroke="#FFCC00" stroke-width="1" opacity="0.022"/>

    <!-- Road surface -->
    <rect x="0" y="178" width="900" height="32" fill="#0a0a0c"/>
    <rect x="0" y="175" width="900" height="6"  fill="#131316"/>
    <!-- Road center dashes -->
    <line x1="20"  y1="188" x2="60"  y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="100" y1="188" x2="140" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="180" y1="188" x2="220" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="260" y1="188" x2="300" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="340" y1="188" x2="380" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="420" y1="188" x2="460" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="500" y1="188" x2="540" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="580" y1="188" x2="620" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="660" y1="188" x2="700" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="740" y1="188" x2="780" y2="188" stroke="#222228" stroke-width="3"/>
    <line x1="820" y1="188" x2="860" y2="188" stroke="#222228" stroke-width="3"/>

    <!-- ═══ SIGN GROUP — centered at x=693, pole at x=693 ═══ -->
    <g class="sign-group">
      <!-- Pole — centered at x=693 -->
      <rect x="689" y="94" width="8" height="84" fill="url(#pole-g)" rx="2"/>
      <!-- Drop shadow -->
      <rect x="387" y="13" width="310" height="83" rx="14" fill="#000" opacity="0.4" transform="translate(3,4)"/>
      <!-- Black border rect — x=387 to x=697, center=542... wait let me recalculate -->
      <!-- Sign: center at x=693, width=310 → left=538, right=848 -->
      <rect x="538" y="9"  width="310" height="83" rx="14" fill="#000"/>
      <!-- Yellow sign body — 6px inset on each side -->
      <rect x="544" y="14" width="298" height="73" rx="10" fill="#FFCC00"/>
      <!-- Sign text — centered at x=693 -->
      <text x="693" y="53"
            font-family="'Bebas Neue', 'Arial Narrow', sans-serif"
            font-size="26" fill="#000"
            text-anchor="middle" dominant-baseline="middle"
            letter-spacing="0">ortsschildersprint</text>
    </g>

    <!-- ═══ SPEED LINES behind cyclists ═══ -->
    <g class="speed-lines">
      <line x1="6"  y1="102" x2="52" y2="102" stroke="#FFCC00" stroke-width="2"   opacity="0.11"/>
      <line x1="2"  y1="114" x2="56" y2="114" stroke="#FFCC00" stroke-width="1.5" opacity="0.08"/>
      <line x1="8"  y1="125" x2="46" y2="125" stroke="#FFCC00" stroke-width="1"   opacity="0.06"/>
      <line x1="70" y1="106" x2="106" y2="106" stroke="#FFCC00" stroke-width="1.5" opacity="0.07"/>
      <line x1="66" y1="118" x2="102" y2="118" stroke="#FFCC00" stroke-width="1"   opacity="0.05"/>
    </g>

    <!-- ═══ CYCLISTS GROUP ═══ -->
    <!--
      Two road bikes, side-by-side in sprint.
      Road level in group = y=0 (translate puts them at y=178).
      Wheel radius = 30. Wheelbase = 76.
      Rider B (behind): translate(50,178) scale(0.84)  → front wheel right edge ≈ 156px
      Rider A (lead):   translate(168,178) scale(1.0)  → rear wheel left edge = 138px
      Result: wheel-to-wheel with ~18px gap, bodies clearly separate.
    -->
    <g class="cyclists-group">

      <!-- ── RIDER B — behind, 84% scale, leg phase B ── -->
      <g transform="translate(50,178) scale(0.84)" stroke="#FFCC00" stroke-linecap="round" stroke-linejoin="round" opacity="0.78">
        <!-- Rear wheel -->
        <circle cx="0"  cy="-30" r="30" stroke-width="4.5" fill="none"/>
        <line x1="0"  y1="-60" x2="0"  y2="0"    stroke-width="1.4" opacity="0.32"/>
        <line x1="-30" y1="-30" x2="30" y2="-30" stroke-width="1.4" opacity="0.32"/>
        <line x1="-21" y1="-51" x2="21" y2="-9"  stroke-width="1.4" opacity="0.32"/>
        <line x1="21"  y1="-51" x2="-21" y2="-9" stroke-width="1.4" opacity="0.32"/>
        <circle cx="0" cy="-30" r="4.5" fill="#FFCC00" stroke="none"/>
        <!-- Front wheel -->
        <circle cx="76" cy="-30" r="30" stroke-width="4.5" fill="none"/>
        <line x1="76" y1="-60" x2="76" y2="0"    stroke-width="1.4" opacity="0.32"/>
        <line x1="46" y1="-30" x2="106" y2="-30" stroke-width="1.4" opacity="0.32"/>
        <line x1="55" y1="-51" x2="97"  y2="-9"  stroke-width="1.4" opacity="0.32"/>
        <line x1="97" y1="-51" x2="55"  y2="-9"  stroke-width="1.4" opacity="0.32"/>
        <circle cx="76" cy="-30" r="4.5" fill="#FFCC00" stroke="none"/>
        <!-- BB + chainring -->
        <circle cx="35" cy="-22" r="6" fill="#FFCC00" stroke="none"/>
        <circle cx="35" cy="-22" r="18" stroke-width="2" opacity="0.28" fill="none"/>
        <!-- Frame -->

<script>
  const SUPABASE_URL = "https://slcprtkqkqwgstnyfpus.supabase.co";

  const { createClient } = supabase;

  // ── Helpers ──────────────────────────────────────────────────────────────

  async function fetchJSON(path) {
    const sess = (await sb.auth.getSession()).data.session;
    const key  = sess ? sess.access_token : SUPABASE_KEY;
    const res  = await fetch(SUPABASE_URL + path, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + key }
    });
    if (!res.ok) throw new Error(res.status + " " + res.statusText);
    return res.json();
  }

  function fmtTime(ts) {
    return new Date(ts * 1000).toLocaleString("de-DE",
      { weekday:"short", day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
  }
  function fmtDuration(sec) {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
    return h > 0 ? `${h}h ${m}min` : `${m} min`;
  }
  function shortId(id) { return id ? "…" + id.slice(-6) : "?"; }

  // ── Auth UI ───────────────────────────────────────────────────────────────

  document.getElementById("to-register").addEventListener("click", e => {
    e.preventDefault();
    document.getElementById("login-view").style.display = "none";
    document.getElementById("register-view").style.display = "block";
  });
  document.getElementById("to-login").addEventListener("click", e => {
    e.preventDefault();
    document.getElementById("register-view").style.display = "none";
    document.getElementById("login-view").style.display = "block";
  });

  document.getElementById("btn-login").addEventListener("click", async () => {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl    = document.getElementById("login-error");

    if (!email || !password) {
      errEl.textContent = "Bitte E-Mail und Passwort eingeben.";

      return;
    }

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = "block";
    }
  });

  document.getElementById("btn-register").addEventListener("click", async () => {
    const name     = document.getElementById("reg-name").value.trim();
    const email    = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    const deviceId = document.getElementById("reg-device").value.trim();
    const errEl    = document.getElementById("reg-error");
    const infoEl   = document.getElementById("reg-info");
    errEl.style.display = "none";
    infoEl.style.display = "none";

    if (!name || !email || !password || !deviceId) {
      errEl.textContent = "Bitte alle Felder ausfüllen.";

      return;
    }

    const { error } = await sb.auth.signUp({
      email, password,
      options: {
        data: { display_name: name, device_id: deviceId },
        emailRedirectTo: "https://85tvcgwnjr-jpg.github.io/ortsschildersprint/"
      }
    });

    if (error) {
      const msg = error.message.toLowerCase();
      errEl.textContent = (msg.includes("rate") || msg.includes("limit"))
        ? "Versuche es später erneut."
        : (msg.includes("already") || msg.includes("registered") || msg.includes("existing"))
        ? "Ein Konto mit dieser E-Mail-Adresse existiert bereits."
        : error.message;
      errEl.style.display = "block";
    } else {
      infoEl.textContent = "✓ Registriert! Bitte E-Mail bestätigen.";

      document.getElementById("reg-password").value = "";

  document.getElementById("btn-logout").addEventListener("click", () => sb.auth.signOut());

  // ── Auth State ────────────────────────────────────────────────────────────

  sb.auth.onAuthStateChange(async (_event, session) => {
    if (session) {
      document.getElementById("auth-screen").style.display = "none";
      document.getElementById("app-screen").style.display  = "block";
      const displayName = session.user.user_metadata?.display_name || session.user.email;
      const deviceId    = session.user.user_metadata?.device_id || "";
      document.getElementById("user-info").textContent = displayName;
      document.getElementById("user-avatar").textContent = displayName ? displayName[0].toUpperCase() : "?";

      // Upsert profile so rankings can show names
      if (deviceId && displayName) {
        fetch(SUPABASE_URL + "/rest/v1/profiles", {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + session.access_token,
            "Content-Type": "application/json",
            "Prefer": "resolution=merge-duplicates"
          },
          body: JSON.stringify({ device_id: deviceId, display_name: displayName, updated_at: new Date().toISOString() })
        }).catch(() => {});

      loadApp(deviceId);
    } else {
      document.getElementById("auth-screen").style.display = "flex";
      document.getElementById("app-screen").style.display  = "none";
      document.getElementById("root").innerHTML = '<div class="loading">Lade Fahrten…</div>';
    }
  });

  // ── Ranking popup ─────────────────────────────────────────────────────────

  async function loadProfiles(deviceIds) {
    if (!deviceIds.length) return {};
    try {
      const rows = await fetchJSON(`/rest/v1/profiles?device_id=in.(${encodeURIComponent(deviceIds.join(","))})&select=device_id,display_name`);
      const map = {};
      for (const r of rows) map[r.device_id] = r.display_name;
      return map;
    } catch(e) { return {}; }
  }

  async function buildRankingHtml(signId, crossingTs, myDeviceId) {
    const tFrom = crossingTs - 30;
    const tTo   = crossingTs + 30;
    const rows  = await fetchJSON(
      `/rest/v1/crossings?sign_id=eq.${encodeURIComponent(signId)}` +
      `&timestamp=gte.${tFrom}&timestamp=lte.${tTo}` +
      `&order=timestamp.asc&limit=50&select=device_id,timestamp`
    );
    const best = {};
    for (const r of rows) {
      if (!best[r.device_id] || r.timestamp < best[r.device_id])
        best[r.device_id] = r.timestamp;
    }
    let leaderTs = crossingTs;
    for (const ts of Object.values(best)) { if (ts < leaderTs) leaderTs = ts; }
    const cutoff = leaderTs + 30;
    const group  = Object.entries(best)
      .filter(([, ts]) => ts <= cutoff)
      .sort(([, a], [, b]) => a - b);
    if (group.length === 0) return '<div class="popup-sign-loading">Keine Daten</div>';

    const profiles = await loadProfiles(group.map(([dev]) => dev));

    return group.map(([dev, ts], i) => {
      const delta    = (ts - leaderTs).toFixed(1);
      const isMe     = myDeviceId && dev === myDeviceId;
      const devName  = isMe ? "Du" : (profiles[dev] || dev);
      const deltaStr = i === 0 ? "" : `<span class="popup-sign-delta">+${delta}s</span>`;
      return `<div class="popup-sign-row ${isMe ? "me" : ""}">
        <span>${i+1}. ${devName}</span>${deltaStr}
      </div>`;
    }).join("");
  }

  // ── Road matching ─────────────────────────────────────────────────────────

  async function matchToRoads(track) {
    const MAX = 99;
    let pts = track;
    if (pts.length > MAX) {
      const out = [];
      for (let i = 0; i < MAX; i++) out.push(pts[Math.floor(i * pts.length / MAX)]);
      out.push(pts[pts.length - 1]);
      pts = out;
    }
    const coords = pts.map(p => `${p[1]},${p[0]}`).join(';');
    const res = await fetch(
      `https://router.project-osrm.org/route/v1/cycling/${coords}?overview=full&geometries=geojson`
    );
    if (!res.ok) throw new Error('OSRM ' + res.status);
    const data = await res.json();
    if (data.code !== 'Ok' || !data.routes?.length) throw new Error('no route');
    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
  }

  // ── Map ───────────────────────────────────────────────────────────────────

  async function buildMap(ride, mapEl, myDeviceId) {
    const [rideData, crossings] = await Promise.all([
      fetchJSON(`/rest/v1/rides?id=eq.${ride.id}&select=gps_track`),
      fetchJSON(
        `/rest/v1/crossings?device_id=eq.${encodeURIComponent(ride.device_id)}` +
        `&timestamp=gte.${ride.started_at}&timestamp=lte.${ride.ended_at}` +
        `&order=timestamp.asc&select=sign_id,sign_name,timestamp`
      )
    ]);
    const track = rideData[0]?.gps_track || [];
    const map   = L.map(mapEl);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap", maxZoom: 19
    }).addTo(map);
    if (track.length >= 2) {
      let routePoints = track.map(p => [p[0], p[1]]);
      try { routePoints = await matchToRoads(track); } catch(e) {}
      const line = L.polyline(routePoints, { color: "#FFCC00", weight: 3 }).addTo(map);
      L.circleMarker(routePoints[0],                    { radius:6, color:"#00c853", fillColor:"#00c853", fillOpacity:1 }).bindPopup("Start").addTo(map);
      L.circleMarker(routePoints[routePoints.length-1], { radius:6, color:"#ff5252", fillColor:"#ff5252", fillOpacity:1 }).bindPopup("Ende").addTo(map);
      map.fitBounds(line.getBounds(), { padding:[20,20] });
    }
    for (const c of crossings) {
      const approxW = Math.round(c.sign_name.length * 5.5 + 14);
      const signIcon = L.divIcon({
        html: `<div style="display:flex;flex-direction:column;align-items:center;">
          <div style="
            background:#FFCC00;
            border:2.5px solid #444;
            border-radius:4px;
            padding:2px 6px;
            font-size:9px;
            font-weight:700;
            color:#000;
            white-space:nowrap;
            font-family:-apple-system,sans-serif;
            line-height:1.4;
            box-shadow:2px 2px 0 #888, 0 2px 6px rgba(0,0,0,0.35);
          ">${c.sign_name}</div>
          <div style="
            width:3px;
            height:14px;
            background:linear-gradient(to right,#ccc,#888,#ccc);
            border-radius:0 0 2px 2px;
          "></div>
        </div>`,
        className: "",
        iconAnchor: [Math.round(approxW / 2), 30]
      });
      let nearest = null, minDiff = Infinity;
      for (const p of track) {
        const d = Math.abs(p[2] - c.timestamp);
        if (d < minDiff) { minDiff = d; nearest = p; }
      }
      if (!nearest) continue;
      const marker = L.marker([nearest[0], nearest[1]], { icon: signIcon }).addTo(map);
      const title  = `<div class="popup-sign-title">${c.sign_name}</div>`;
      marker.bindPopup(
        title + `<div class="popup-sign-loading">Lade…</div>`,
        { maxWidth: 260, className: "sign-popup" }
      );
      marker.on("popupopen", async () => {
        try {
          const html = await buildRankingHtml(c.sign_id, c.timestamp, myDeviceId);
          marker.getPopup().setContent(title + html);
        } catch(e) {
          marker.getPopup().setContent(title + `<div class="popup-sign-loading" style="color:#c00">Fehler</div>`);
        }
      });
    }
    return { track, crossings };
  }

  // ── Ranking data (structured, for image export) ───────────────────────────

  async function buildRankingData(signId, crossingTs, myDeviceId) {
    try {
      const tFrom = crossingTs - 30, tTo = crossingTs + 30;
      const rows = await fetchJSON(
        `/rest/v1/crossings?sign_id=eq.${encodeURIComponent(signId)}` +
        `&timestamp=gte.${tFrom}&timestamp=lte.${tTo}&order=timestamp.asc&limit=50&select=device_id,timestamp`
      );
      const best = {};
      for (const r of rows) {
        if (!best[r.device_id] || r.timestamp < best[r.device_id]) best[r.device_id] = r.timestamp;
      }
      let leaderTs = crossingTs;
      for (const ts of Object.values(best)) { if (ts < leaderTs) leaderTs = ts; }
      const group = Object.entries(best).filter(([,ts]) => ts <= leaderTs + 30).sort(([,a],[,b]) => a - b);
      const profiles = await loadProfiles(group.map(([dev]) => dev));
      return group.map(([dev, ts], i) => ({
        name:  myDeviceId && dev === myDeviceId ? "Du" : (profiles[dev] || dev.slice(-6)),
        delta: (ts - leaderTs).toFixed(1),
        isMe:  myDeviceId && dev === myDeviceId,
        rank:  i + 1
      }));
    } catch(e) { return []; }
  }

  // ── Canvas helpers ────────────────────────────────────────────────────────

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawSignMarker(ctx, px, py, signName, ranking) {
    const nameFont = "bold 22px -apple-system, BlinkMacSystemFont, sans-serif";
    const rankFont = "bold 17px -apple-system, BlinkMacSystemFont, sans-serif";
    const top3     = (ranking || []).slice(0, 3);
    const padX = 18, padY = 10, nameH = 28, rowH = 22;
    const divH = top3.length > 0 ? 8 : 0;

    ctx.font = nameFont;
    let maxW = ctx.measureText(signName).width;
    ctx.font = rankFont;
    for (const r of top3) {
      const label = `${r.rank}. ${r.name}${r.rank > 1 ? "  +" + r.delta + "s" : ""}`;
      maxW = Math.max(maxW, ctx.measureText(label).width);
    }

    const sW = maxW + 2 * padX;
    const sH = padY + nameH + divH + top3.length * rowH + padY;
    const sX = px - sW / 2;
    const sY = py - sH - 18;

    // Pole
    const grad = ctx.createLinearGradient(px - 3, 0, px + 3, 0);
    grad.addColorStop(0, "#ccc"); grad.addColorStop(0.5, "#888"); grad.addColorStop(1, "#ccc");
    ctx.fillStyle = grad;
    ctx.fillRect(px - 3, sY + sH, 6, 18);

    // Shadow
    ctx.shadowColor = "rgba(0,0,0,0.35)";
    ctx.shadowBlur = 10; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;

    // Sign fill
    ctx.fillStyle = "#FFCC00";
    roundRect(ctx, sX, sY, sW, sH, 8);
    ctx.fill();

    // Border
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = "#000"; ctx.lineWidth = 3.5;
    roundRect(ctx, sX, sY, sW, sH, 8);
    ctx.stroke();

    // Town name
    ctx.fillStyle = "#000"; ctx.font = nameFont;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(signName, px, sY + padY + nameH / 2);

    // Divider + ranking inside sign
    if (top3.length > 0) {
      ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5;
      const divY = sY + padY + nameH + divH / 2;
      ctx.beginPath();
      ctx.moveTo(sX + 12, divY); ctx.lineTo(sX + sW - 12, divY);
      ctx.stroke();
      ctx.font = rankFont;
      top3.forEach((r, i) => {
        const label = `${r.rank}. ${r.name}${r.rank > 1 ? "  +" + r.delta + "s" : ""}`;
        ctx.fillStyle = "#000";
        ctx.fillText(label, px, sY + padY + nameH + divH + rowH * i + rowH / 2);
      });
    }
  }

  // ── Image export (transparent PNG, Instagram-style) ───────────────────────

  async function exportImage(card, btn, myDeviceId) {
    const d = card._exportData;
    if (!d) { alert("Öffne die Fahrt zuerst."); return; }
    btn.innerHTML = "Erstelle…"; btn.disabled = true;

    try {
      const [routePoints, rankingsData] = await Promise.all([
        matchToRoads(d.track).catch(() => d.track.map(p => [p[0], p[1]])),
        Promise.all(d.crossings.map(c => buildRankingData(c.sign_id, c.timestamp, myDeviceId)))
      ]);

      const W = 1080, H = 1350;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, W, H);

      let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
      for (const p of routePoints) {
        minLat = Math.min(minLat, p[0]); maxLat = Math.max(maxLat, p[0]);
        minLon = Math.min(minLon, p[1]); maxLon = Math.max(maxLon, p[1]);
      }

      const PAD  = 160;
      const usW  = W - 2 * PAD;
      const usH  = H - 2 * PAD;
      const scX  = usW / (maxLon - minLon || 0.001);
      const scY  = usH / (maxLat - minLat || 0.001);
      const sc   = Math.min(scX, scY);
      const offX = PAD + (usW - (maxLon - minLon) * sc) / 2;
      const offY = PAD + (usH - (maxLat - minLat) * sc) / 2;

      const toX = lon => offX + (lon - minLon) * sc;
      const toY = lat => offY + (maxLat - lat) * sc;

      ctx.beginPath();
      ctx.strokeStyle = "#000";
      ctx.lineWidth   = 8;
      ctx.lineCap     = "round";
      ctx.lineJoin    = "round";
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur  = 10;
      routePoints.forEach((p, i) => {
        const x = toX(p[1]), y = toY(p[0]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.arc(toX(routePoints[0][1]), toY(routePoints[0][0]), 14, 0, Math.PI * 2);
      ctx.fillStyle = "#00C853"; ctx.fill();
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();

      const ep = routePoints[routePoints.length - 1];
      ctx.beginPath();
      ctx.arc(toX(ep[1]), toY(ep[0]), 14, 0, Math.PI * 2);
      ctx.fillStyle = "#FF5252"; ctx.fill();
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();

      for (let i = 0; i < d.crossings.length; i++) {
        const c = d.crossings[i];
        let nearest = null, minDiff = Infinity;
        for (const p of d.track) {
          const dd = Math.abs(p[2] - c.timestamp);
          if (dd < minDiff) { minDiff = dd; nearest = p; }
        }
        if (!nearest) continue;
        drawSignMarker(ctx, toX(nearest[1]), toY(nearest[0]), c.sign_name, rankingsData[i]);
      }

      canvas.toBlob(blob => {
        const a = document.createElement("a");
        a.href     = URL.createObjectURL(blob);
        a.download = `ortsschildersprint-${d.ride.started_at}.png`;
        a.click();
      }, "image/png");

    } catch(e) {
      alert("Fehler: " + e.message);
    } finally {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>Share';
      btn.disabled = false;
    }
  }

  // ── Main App ──────────────────────────────────────────────────────────────

  async function loadApp(myDeviceId) {
    const root = document.getElementById("root");

    try {
      const url = myDeviceId
        ? `/rest/v1/rides?device_id=eq.${encodeURIComponent(myDeviceId)}&select=id,device_id,started_at,ended_at&order=started_at.desc&limit=50`
        : `/rest/v1/rides?select=id,device_id,started_at,ended_at&order=started_at.desc&limit=50`;

      const rides = await fetchJSON(url);

      if (rides.length === 0) {
        root.innerHTML = `<div class="empty-state">
          <svg width="72" height="48" viewBox="0 0 200 120" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="opacity:.2;margin-bottom:.8rem">
            <circle cx="40" cy="88" r="28" stroke-width="8"/>
            <circle cx="160" cy="88" r="28" stroke-width="8"/>
            <circle cx="100" cy="80" r="5" fill="currentColor" stroke="none"/>
            <line x1="40" y1="88" x2="100" y2="80" stroke-width="6"/>
            <line x1="40" y1="88" x2="92" y2="42" stroke-width="5"/>
            <line x1="100" y1="80" x2="92" y2="42" stroke-width="7"/>
            <line x1="92" y1="42" x2="132" y2="44" stroke-width="5"/>
            <line x1="100" y1="80" x2="132" y2="44" stroke-width="7"/>
            <line x1="132" y1="44" x2="160" y2="88" stroke-width="6"/>
            <path d="M82 38 C86 34 96 34 106 37" stroke-width="7"/>
            <line x1="132" y1="44" x2="138" y2="30" stroke-width="5"/>
            <path d="M130 30 C135 24 143 24 147 30 C149 36 146 42 141 42" stroke-width="5"/>
          </svg>
          <strong>Noch keine Fahrten</strong>
          Beende eine Aktivität auf dem Garmin und sie erscheint hier.
        </div>`;
        return;
      }

      root.innerHTML = `<div class="section-label">
        <svg width="14" height="14" viewBox="0 0 200 120" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:6px;opacity:.6">
          <circle cx="40" cy="88" r="28" stroke-width="8"/>
          <circle cx="160" cy="88" r="28" stroke-width="8"/>
          <circle cx="100" cy="80" r="5" fill="currentColor" stroke="none"/>
          <line x1="40" y1="88" x2="100" y2="80" stroke-width="6"/>
          <line x1="40" y1="88" x2="92" y2="42" stroke-width="5"/>
          <line x1="100" y1="80" x2="92" y2="42" stroke-width="7"/>
          <line x1="92" y1="42" x2="132" y2="44" stroke-width="5"/>
          <line x1="100" y1="80" x2="132" y2="44" stroke-width="7"/>
          <line x1="132" y1="44" x2="160" y2="88" stroke-width="6"/>
          <path d="M82 38 C86 34 96 34 106 37" stroke-width="7"/>
          <line x1="132" y1="44" x2="138" y2="30" stroke-width="5"/>
          <path d="M130 30 C135 24 143 24 147 30 C149 36 146 42 141 42" stroke-width="5"/>
        </svg>
        Deine Fahrten
      </div>`;
      const list = document.createElement("div");
      list.className = "ride-list";

      for (const ride of rides) {
        const dur  = ride.ended_at - ride.started_at;
        const card = document.createElement("div");
        card.className = "ride-card";
        card.innerHTML = `
          <div class="ride-header">
            <div>
              <div class="ride-title">${fmtTime(ride.started_at)}</div>
              <div class="ride-meta">${fmtDuration(dur)}</div>
            </div>
            <div class="toggle-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>
          <div class="ride-body">
            <div class="map-container" id="map-${ride.id}"></div>
            <div class="ride-actions">
              <button class="btn btn-image">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                Share
              </button>
              <button class="btn btn-delete">Löschen</button>
            </div>
          </div>`;

        const header = card.querySelector(".ride-header");
        const mapEl  = card.querySelector(".map-container");
        const btnImg = card.querySelector(".btn-image");
        const btnDel = card.querySelector(".btn-delete");
        let loaded = false;

        header.addEventListener("click", async () => {
          card.classList.toggle("open");
          if (card.classList.contains("open") && !loaded) {
            loaded = true;
            try {
              const { track, crossings } = await buildMap(ride, mapEl, myDeviceId);
              card._exportData = { ride, track, crossings };
            } catch(e) {
              mapEl.innerHTML = `<div class="error">Fehler: ${e.message}</div>`;
            }
          }
        });

        btnImg.addEventListener("click", () => exportImage(card, btnImg, myDeviceId));
        btnDel.addEventListener("click", async () => {
          if (!confirm("Fahrt löschen?")) return;
          await fetch(SUPABASE_URL + `/rest/v1/rides?id=eq.${ride.id}`, {
            method: "DELETE",
            headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
          });
          card.remove();
        });

        list.appendChild(card);
      }

      root.appendChild(list);
    } catch(e) {
      root.innerHTML = `<div class="error">Verbindungsfehler: ${e.message}</div>`;
    }
  }
</script>
